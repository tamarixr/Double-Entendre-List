function allDemonTags(){
  const set = new Set();
  APP.demons.forEach(d => (d.tags||[]).forEach(t => set.add(t)));
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function allCreators(){
  const set = new Set();
  APP.demons.forEach(d => { if(d.creator) set.add(d.creator); });
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function allVerifiers(){
  const set = new Set();
  APP.demons.forEach(d => { if(d.verifier) set.add(d.verifier); });
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function getTrendingDemonIds(){
  const cutoff = Date.now() - 14*24*60*60*1000;
  const counts = {};
  APP.submissions.forEach(s => {
    if(s.status==='approved' && s.type!=='progress' && s.submittedAt >= cutoff){
      counts[s.demonId] = (counts[s.demonId]||0) + 1;
    }
  });
  const ranked = Object.entries(counts).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return new Set(ranked.map(([id])=>id));
}
function getListStatus(rank){
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);
  if(rank < mainSize) return 'Main';
  if(rank < extSize) return 'Extended';
  return 'Legacy';
}
function getFilteredSortedDemons(){
  const demons = APP.demons;
  const { search, tags, sort, section, favoritesOnly, creator, verifier, minReq, maxReq, dateFrom, dateTo } = APP.listFilter;
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);
  const q = search.trim().toLowerCase();
  let list = demons.map((d,i) => ({ d, rank: i }));
  if(section === 'main') list = list.filter(({rank}) => rank < mainSize);
  else if(section === 'extended') list = list.filter(({rank}) => rank >= mainSize && rank < extSize);
  else if(section === 'legacy') list = list.filter(({rank}) => rank >= extSize);
  if(favoritesOnly){
    const favs = getFavorites();
    list = list.filter(({d}) => favs.has(d.id));
  }
  if(creator) list = list.filter(({d}) => d.creator === creator);
  if(verifier) list = list.filter(({d}) => d.verifier === verifier);
  if(minReq) list = list.filter(({d}) => (d.requirement||100) >= Number(minReq));
  if(maxReq) list = list.filter(({d}) => (d.requirement||100) <= Number(maxReq));
  if(dateFrom) list = list.filter(({d}) => d.publishDate && d.publishDate >= dateFrom);
  if(dateTo) list = list.filter(({d}) => d.publishDate && d.publishDate <= dateTo);
  if(q){
    list = list.filter(({d}) =>
      d.name.toLowerCase().includes(q) ||
      (d.creator||'').toLowerCase().includes(q) ||
      (d.verifier||'').toLowerCase().includes(q) ||
      countryName(d.country).toLowerCase().includes(q)
    );
  }
  if(tags.length){
    list = list.filter(({d}) => tags.every(t => (d.tags||[]).includes(t)));
  }
  const sorted = list.slice();
  if(sort === 'points-desc') sorted.sort((a,b)=>b.d.points-a.d.points);
  else if(sort === 'points-asc') sorted.sort((a,b)=>a.d.points-b.d.points);
  else if(sort === 'az') sorted.sort((a,b)=>a.d.name.localeCompare(b.d.name));
  else if(sort === 'newest') sorted.sort((a,b)=>(b.d.addedAt||0)-(a.d.addedAt||0));
  else if(sort === 'creator') sorted.sort((a,b)=>(a.d.creator||'').localeCompare(b.d.creator||''));
  else if(sort === 'publishdate') sorted.sort((a,b)=>(b.d.publishDate||'').localeCompare(a.d.publishDate||''));
  else sorted.sort((a,b)=>a.rank-b.rank); // rank = default list order
  return sorted;
}

function exportDemonListCsv(){
  const demons = APP.demons;
  if(!demons.length){ showToast('No demons to export', 'error'); return; }
  const header = 'Rank,Name,Level ID,Creator,Verifier,Country,Points,Requirement,Song Artist,Song Name,Publish Date\n';
  const rows = demons.map((d,i) => `${i+1},"${(d.name||'').replace(/"/g,'""')}","${(d.levelId||'').replace(/"/g,'""')}","${(d.creator||'').replace(/"/g,'""')}","${(d.verifier||'').replace(/"/g,'""')}",${countryName(d.country)},${d.points},${d.requirement||100},"${(d.songArtist||'').replace(/"/g,'""')}","${(d.songName||'').replace(/"/g,'""')}",${d.publishDate||''}`).join('\n');
  const blob = new Blob([header+rows], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'demon-list.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}

function renderRankSparkline(demonId){
  const points = APP.snapshots
    .map(s => ({ date: s.date, rank: s.demons.findIndex(d => d.id === demonId) }))
    .filter(p => p.rank !== -1);
  if(points.length < 2) return '';
  const w = 100, h = 28, pad = 3;
  const maxRank = Math.max(...points.map(p=>p.rank), 1);
  const minRank = Math.min(...points.map(p=>p.rank), 0);
  const range = Math.max(1, maxRank - minRank);
  const stepX = (w - pad*2) / (points.length - 1);
  const coords = points.map((p,i) => {
    const x = pad + i*stepX;
    const y = pad + ((p.rank - minRank) / range) * (h - pad*2); // higher rank number = lower on screen
    return [x,y];
  });
  const path = coords.map((c,i) => (i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const first = points[0].rank+1, last = points[points.length-1].rank+1;
  const trend = last < first ? 'var(--green)' : (last > first ? 'var(--red)' : 'var(--text-dim)');
  return `
    <div class="rating-row" style="margin-top:8px;align-items:center;">
      <span style="width:64px;">Placement</span>
      <svg viewBox="0 0 ${w} ${h}" style="width:100px;height:28px;flex:none;"><path d="${path}" fill="none" stroke="${trend}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-size:11px;color:var(--text-dim);">#${first} → #${last} over ${points.length} snapshot${points.length===1?'':'s'}</span>
    </div>`;
}

          </div>
          <input id="dm-tags" value="${escapeHtml(currentTagsString)}" placeholder="e.g. Memory, Timing, XL, Wave, Challenge">

        </div>
        <div class="field"><label>Description (optional)</label><textarea id="dm-desc">${src?escapeHtml(src.description||''):''}</textarea></div>
        <div class="field"><label>🔒 Admin Notes <span style="color:var(--text-dim);font-weight:400;">(mods only, never shown publicly)</span></label><textarea id="dm-adminnote" placeholder="Internal notes about this level...">${src?escapeHtml(src.adminNote||''):''}</textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveDemonForm(${editing?`'${editing.id}'`:'null'}${prefill?`,'${prefill.id}'`:''})">${editing?'Save Changes':'Add Demon'}</button>
      </div>

}
function quickAddTag(t){
  const input = document.getElementById('dm-tags');
  if(!input) return;
  const parts = input.value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!parts.includes(t)) parts.push(t);
  input.value = parts.join(', ');
}
async function saveDemonForm(id, promotedFromId){
  const name = document.getElementById('dm-name').value.trim();
  if(!name) return;

  const rawTags = document.getElementById('dm-tags').value;
  const processedTags = rawTags.split(',')
    .map(t => t.trim())
    .filter(t => t.length > 0);

  let requirement = parseInt(document.getElementById('dm-requirement').value);
  if(isNaN(requirement)) requirement = 100;
  requirement = Math.min(100, Math.max(1, requirement));

  let requirement2 = parseInt(document.getElementById('dm-req2').value);
  requirement2 = isNaN(requirement2) ? null : Math.min(100, Math.max(1, requirement2));
  if(requirement2 !== null && requirement2 >= requirement) requirement2 = null; // must be strictly lower
  const points2 = parseInt(document.getElementById('dm-points2').value) || 0;

  let decoRating = parseInt(document.getElementById('dm-decorating').value);
  decoRating = isNaN(decoRating) ? null : Math.min(10, Math.max(1, decoRating));
  let gameplayRating = parseInt(document.getElementById('dm-gameplayrating').value);
  gameplayRating = isNaN(gameplayRating) ? null : Math.min(10, Math.max(1, gameplayRating));
  let downloadCount = parseInt(document.getElementById('dm-downloads').value);
  downloadCount = isNaN(downloadCount) ? 0 : Math.max(0, downloadCount);

  const points = parseInt(document.getElementById('dm-points').value) || 0;
  const difficultyChange = document.getElementById('dm-diffchange').value;

  const data = {
    name,
    creator: document.getElementById('dm-creator').value.trim(),
    verifier: document.getElementById('dm-verifier').value.trim(),
    country: document.getElementById('dm-country').value,
    points,
    video: document.getElementById('dm-video').value.trim(),
    verifyVideo: document.getElementById('dm-verifyvideo').value.trim(),
    thumbnail: document.getElementById('dm-thumbnail').value.trim(),
    levelId: document.getElementById('dm-levelid').value.trim(),
    songArtist: document.getElementById('dm-songartist').value.trim(),
    songName: document.getElementById('dm-songname').value.trim(),
    publishDate: document.getElementById('dm-publishdate').value,
    description: document.getElementById('dm-desc').value.trim(),
    tags: processedTags,
    requirement,
    requirement2,
    points2,
    lengthTag: document.getElementById('dm-length').value,
    difficultyChange,
    decoRating,
    gameplayRating,
    downloadCount
  };
  const adminNoteEl = document.getElementById('dm-adminnote');
  if(adminNoteEl) data.adminNote = adminNoteEl.value.trim();
  if(id){
    const d = APP.demons.find(x=>x.id===id);
    logLevelHistory(d, data);
    Object.assign(d, data);
    logChange(`"${data.name}" was edited`, true);
  }else{
    APP.demons.push({ id: uid(), ...data, addedAt: Date.now(), likes:{}, enjoymentRatings:{}, levelChangelog:[] });
    APP.selectedDemonId = APP.demons[APP.demons.length-1].id;
    logChange(promotedFromId ? `"${data.name}" was promoted to the main list at #${APP.demons.length}` : `"${data.name}" was added to the list at #${APP.demons.length}`);
  }
  await saveDemons();
  if(promotedFromId){
    APP.upcoming = APP.upcoming.filter(u=>u.id!==promotedFromId);
    await saveUpcoming();
  }
  closeModal();
  renderAll();
  showToast(id ? 'Demon updated' : (promotedFromId ? 'Promoted to main list' : 'Demon added'));
}
function logLevelHistory(d, newData){
  if(!d.levelChangelog) d.levelChangelog = [];
  const entries = [];
  if(newData.requirement !== d.requirement) entries.push(`Requirement changed from ${d.requirement||100}% to ${newData.requirement}%`);
  if(newData.points !== d.points) entries.push(`Points changed from ${d.points} to ${newData.points}`);
  if(newData.difficultyChange && newData.difficultyChange !== d.difficultyChange) entries.push(`Level marked as ${newData.difficultyChange}`);
  entries.forEach(text => d.levelChangelog.push({ id: uid(), ts: Date.now(), text, auto: true, mod: APP.currentUser ? APP.currentUser.username : null }));
}
async function addLevelChangelogEntry(demonId){
  const d = APP.demons.find(x=>x.id===demonId);
  if(!d || !isMod()) return;
  const text = prompt('Changelog entry text (e.g. "Nerfed from Extreme to Insane Demon"):');
  if(!text || !text.trim()) return;
  if(!d.levelChangelog) d.levelChangelog = [];
  d.levelChangelog.push({ id: uid(), ts: Date.now(), text: text.trim(), auto:false, mod: APP.currentUser.username });
  await saveDemons();
  renderListTab();
  showToast('Changelog entry added');
}
async function toggleLevelLike(demonId){
  if(!APP.currentUser){ showToast('Log in to like levels', 'error'); return; }
  const d = APP.demons.find(x=>x.id===demonId);
  if(!d) return;
  if(!d.likes) d.likes = {};
  const u = APP.currentUser.username.toLowerCase();
  if(d.likes[u]) delete d.likes[u]; else d.likes[u] = true;
  await saveDemons();
  renderListTab();
}
async function rateEnjoyment(demonId, value){
  if(!APP.currentUser){ showToast('Log in to rate levels', 'error'); return; }
  const d = APP.demons.find(x=>x.id===demonId);
  if(!d) return;
  if(!d.enjoymentRatings) d.enjoymentRatings = {};
  d.enjoymentRatings[APP.currentUser.username.toLowerCase()] = value;
  await saveDemons();
  renderListTab();
  showToast('Rating saved');
}
function getEnjoymentAverage(d){
  const vals = Object.values(d.enjoymentRatings||{});
  if(!vals.length) return null;
  return { avg: (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1), count: vals.length };
}
async function setFeaturedDemon(demonId){
  if(!isAdmin()) return;
  const d = APP.demons.find(x=>x.id===demonId);
  APP.settings.featuredDemonId = (APP.settings.featuredDemonId === demonId) ? null : demonId;
  await saveSettings();
  if(d) logChange(APP.settings.featuredDemonId ? `"${d.name}" was set as the featured level` : `"${d.name}" was unfeatured`, true);
  renderListTab();
  showToast(APP.settings.featuredDemonId ? 'Set as featured level' : 'Removed from featured');
}
async function deleteDemon(id){
  const d = APP.demons.find(x=>x.id===id);
  const ok = await customConfirm(`Remove "${d?d.name:'this demon'}" from the list? This cannot be undone.`, 'Delete demon');
  if(!ok) return;
  APP.demons = APP.demons.filter(d=>d.id!==id);
  if(APP.selectedDemonId===id) APP.selectedDemonId = APP.demons[0]?.id || null;
  await saveDemons();
  if(d) logChange(`"${d.name}" was removed from the list`, true);
  renderAll();
  showToast('Demon deleted');
}
async function moveDemon(id, dir){
  const i = APP.demons.findIndex(d=>d.id===id);
  const j = i+dir;
  if(j<0 || j>=APP.demons.length) return;
  const d = APP.demons[i];
  [APP.demons[i], APP.demons[j]] = [APP.demons[j], APP.demons[i]];
  await saveDemons();
  logChange(`"${d.name}" moved from #${i+1} to #${j+1}`, true);
  renderListTab();
}

/* ============================= GENERIC RANKED LIST ENGINE (Challenge List / Platformer Demon List) ============================= */
/* Powers the Challenge List and Platformer Demon List tabs using the same visual layout as the main Demon List,
   but as fully separate ranked pools with their own data, filters and admin CRUD. */
const LIST_KINDS = {
  challenge: {
    dataKey: 'challenges', filterKey: 'challengeFilter', selKey: 'selectedChallengeId',
    panelId: 'panel-challengelist', searchId: 'clg-search',
    saveFn: 'saveChallenges', mainSizeKey: 'challengeMainListSize', extSizeKey: 'challengeExtendedListSize',
    tab: 'challengelist', noun: 'Challenge', nounPlural: 'Challenges', title: 'Challenge List',
    tagline: 'Community-curated challenge levels — tricky, gimmicky, or just plain evil.'
  },
  platformer: {
    dataKey: 'platformers', filterKey: 'platformerFilter', selKey: 'selectedPlatformerId',
    panelId: 'panel-platformerlist', searchId: 'plt-search',
    saveFn: 'savePlatformers', mainSizeKey: 'platformerMainListSize', extSizeKey: 'platformerExtendedListSize',
    tab: 'platformerlist', noun: 'Platformer Demon', nounPlural: 'Platformer Demons', title: 'Platformer Demon List',
    tagline: 'The hardest platformer-mode levels, ranked by difficulty.'
  }
};
function glData(kind){ return APP[LIST_KINDS[kind].dataKey]; }
function glFilter(kind){ return APP[LIST_KINDS[kind].filterKey]; }
function glSelId(kind){ return APP[LIST_KINDS[kind].selKey]; }
function glSetSelId(kind, id){ APP[LIST_KINDS[kind].selKey] = id; }
function glSave(kind){ return window[LIST_KINDS[kind].saveFn](); }
function glSizes(kind){
  const cfg = LIST_KINDS[kind];
  const mainSize = APP.settings[cfg.mainSizeKey] || 50;
  const extSize = Math.max(mainSize, APP.settings[cfg.extSizeKey] || mainSize);
  return [mainSize, extSize];
}
function glTags(kind){
  const set = new Set();
  glData(kind).forEach(d => (d.tags||[]).forEach(t => set.add(t)));
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function glFilteredSorted(kind){
  const data = glData(kind);
  const { search, tags, sort, section } = glFilter(kind);
  const [mainSize, extSize] = glSizes(kind);
  const q = search.trim().toLowerCase();
  let list = data.map((d,i) => ({ d, rank: i }));
  if(section === 'main') list = list.filter(({rank}) => rank < mainSize);
  else if(section === 'extended') list = list.filter(({rank}) => rank >= mainSize && rank < extSize);
  else if(section === 'legacy') list = list.filter(({rank}) => rank >= extSize);
  if(q){
    list = list.filter(({d}) => d.name.toLowerCase().includes(q) || (d.creator||'').toLowerCase().includes(q) || (d.verifier||'').toLowerCase().includes(q));
  }
  if(tags.length) list = list.filter(({d}) => tags.every(t => (d.tags||[]).includes(t)));
  const sorted = list.slice();
  if(sort === 'points-desc') sorted.sort((a,b)=>(b.d.points||0)-(a.d.points||0));
  else if(sort === 'points-asc') sorted.sort((a,b)=>(a.d.points||0)-(b.d.points||0));
  else if(sort === 'az') sorted.sort((a,b)=>a.d.name.localeCompare(b.d.name));
  else if(sort === 'newest') sorted.sort((a,b)=>(b.d.addedAt||0)-(a.d.addedAt||0));
  else sorted.sort((a,b)=>a.rank-b.rank);
  return sorted;
}
function glSetSearch(kind, v){ glFilter(kind).search = v; renderGenericListTab(kind, true); }
function glSetSort(kind, v){ glFilter(kind).sort = v; renderGenericListTab(kind); }
function glSetSection(kind, v){ glFilter(kind).section = v; renderGenericListTab(kind); }
function glToggleTag(kind, t){
  const f = glFilter(kind);
  const i = f.tags.indexOf(t);
  if(i===-1) f.tags.push(t); else f.tags.splice(i,1);
  renderGenericListTab(kind);
}
function glClearFilters(kind){
  const f = glFilter(kind);
  f.search = ''; f.tags = [];
  renderGenericListTab(kind);
}
function glCopyLink(kind, id, ev){
  if(ev) ev.stopPropagation();
  const url = location.origin + tabToPath(LIST_KINDS[kind].tab);
  copyToClipboard(url, 'List link copied');
}
function selectGenericItem(kind, id){
  glSetSelId(kind, id);
  renderGenericListTab(kind);
}
function renderGenericListTab(kind, preserveFocus){
  const cfg = LIST_KINDS[kind];
  const el = document.getElementById(cfg.panelId);
  if(!el) return;
  const data = glData(kind);
  const f = glFilter(kind);
  if(!glSelId(kind) && data.length) glSetSelId(kind, data[0].id);
  const selected = data.find(d => d.id === glSelId(kind));
  const filtered = glFilteredSorted(kind);
  const [mainSize, extSize] = glSizes(kind);
  const hasExtended = data.length > mainSize && extSize > mainSize;
  const hasLegacy = data.length > extSize;
  const totalPoints = data.reduce((s,d)=>s+(d.points||0),0);
  const hardest = data[0];

  const statCards = data.length ? `
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-val" data-count="${Math.min(data.length,mainSize)}">0</div><div class="sc-lbl">Main List</div></div>
      <div class="stat-card"><div class="sc-val" data-count="${totalPoints}">0</div><div class="sc-lbl">Total Points</div></div>
      <div class="stat-card"><div class="sc-val" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${hardest?escapeHtml(hardest.name):'—'}</div><div class="sc-lbl">#1 Hardest</div></div>
    </div>` : '';

  const tags = glTags(kind);
  const tagChips = tags.length ? `
    <div class="tag-filter-row-live">
      <span class="lbl">Tags</span>
      ${tags.map(t => `<button class="tag-chip ${f.tags.includes(t)?'active':''}" onclick="glToggleTag('${kind}','${escapeHtml(t).replace(/'/g,"\\'")}')">${escapeHtml(t)}</button>`).join('')}
      ${f.tags.length ? `<button class="clear-filters-chip" onclick="glFilter('${kind}').tags=[];renderGenericListTab('${kind}');">Clear tags ×</button>` : ''}
    </div>` : '';

  const sectionToggle = (hasExtended || hasLegacy) ? `
    <div class="status-filter-row" style="padding:10px 12px 0;">
      <button class="status-filter-btn ${f.section==='main'?'active':''}" onclick="glSetSection('${kind}','main')">Main List</button>
      ${hasExtended ? `<button class="status-filter-btn ${f.section==='extended'?'active':''}" onclick="glSetSection('${kind}','extended')">Extended List</button>` : ''}
      <button class="status-filter-btn ${f.section==='legacy'?'active':''}" onclick="glSetSection('${kind}','legacy')">Legacy List</button>
      <button class="status-filter-btn ${f.section==='all'?'active':''}" onclick="glSetSection('${kind}','all')">All</button>
    </div>` : '';

  const toolbar = `
    ${sectionToggle}
    <div class="list-toolbar">
      <div class="list-toolbar-row">
        <div class="search-input-wrap">
          <span class="si-icon">⌕</span>
          <input id="${cfg.searchId}" placeholder="Search by name, creator, verifier..." value="${escapeHtml(f.search)}" oninput="glSetSearch('${kind}', this.value)">
        </div>
        <select class="sort-select" onchange="glSetSort('${kind}', this.value)">
          <option value="rank" ${f.sort==='rank'?'selected':''}>List Order</option>
          <option value="points-desc" ${f.sort==='points-desc'?'selected':''}>Points: High to Low</option>
          <option value="points-asc" ${f.sort==='points-asc'?'selected':''}>Points: Low to High</option>
          <option value="az" ${f.sort==='az'?'selected':''}>Name: A-Z</option>
          <option value="newest" ${f.sort==='newest'?'selected':''}>Newest Added</option>
        </select>
      </div>
      ${tagChips}
    </div>
    ${filtered.length !== data.length ? `<div class="result-count" style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <span>${filtered.length} of ${data.length} levels match</span>
      <button class="clear-filters-chip" onclick="glClearFilters('${kind}')">Clear all filters ×</button>
    </div>` : ''}
  `;

  const rowsArr = filtered.map(({d, rank}, idx) => {
    const i = rank;
    const tagsHtml = (d.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
    const delay = Math.min(idx, 12) * 18;
    const rowHtml = `
    <div class="demon-row ${d.id===glSelId(kind)?'selected':''}" style="animation-delay:${delay}ms" onclick="selectGenericItem('${kind}','${d.id}')">
      <div class="rank-badge ${i<3?'top':''}">${i+1}</div>
      ${getThumbnailUrl(d) ? `<img class="demon-thumb" src="${escapeHtml(getThumbnailUrl(d))}" alt="" loading="lazy" onerror="this.remove()">` : ''}
      <div class="info">
        <div class="name">${escapeHtml(d.name)}</div>
        <div class="creator">${flagEmoji(d.country)} by ${escapeHtml(d.creator||'Unknown')}</div>
        ${tagsHtml ? `<div class="tag-container">${tagsHtml}</div>` : ''}
      </div>
      <div class="pts">${d.points||0}pt</div>
      <button class="row-link-btn" onclick="glCopyLink('${kind}','${d.id}', event)" title="Copy link to this level">🔗</button>
      ${isMod() ? `
      <div class="reorder">
        <button onclick="event.stopPropagation();moveGenericItem('${kind}','${d.id}',-1)" ${i===0?'disabled':''}>&#9650;</button>
        <button onclick="event.stopPropagation();moveGenericItem('${kind}','${d.id}',1)" ${i===data.length-1?'disabled':''}>&#9660;</button>
      </div>` : ''}
    </div>`;
    const showExtDivider = f.section==='all' && f.sort==='rank' && i===mainSize && hasExtended && !f.search && !f.tags.length;
    const showLegDivider = f.section==='all' && f.sort==='rank' && i===extSize && hasLegacy && !f.search && !f.tags.length;
    let divider = '';
    if(showExtDivider) divider = `<div class="legacy-divider"><span class="line"></span>Extended List<span class="line"></span></div>`;
    else if(showLegDivider) divider = `<div class="legacy-divider"><span class="line"></span>Legacy List<span class="line"></span></div>`;
    return divider + rowHtml;
  });

  const rows = data.length ? (filtered.length ? rowsArr.join('') : `<div class="empty-state"><div class="big">No matches</div>Try a different search or clear your tag filters.</div>`)
   : `<div class="empty-state"><div class="big">No ${cfg.nounPlural.toLowerCase()} yet</div>${isMod() ? 'Add one to get started.' : 'Check back soon.'}</div>`;

  const detail = selected ? renderGenericDetail(kind, selected, data.findIndex(d=>d.id===selected.id)) :
    `<div class="empty-state"><div class="big">Nothing selected</div>Pick a level from the list.</div>`;

  el.innerHTML = `
    <div class="page-head">
      <div class="page-head-row">
        <div>
          <h1 class="page-title">${escapeHtml(cfg.title)}</h1>
          <p class="page-desc">${escapeHtml(cfg.tagline)}</p>
        </div>
        ${tabShareButton(cfg.tab)}
      </div>
    </div>
    ${statCards}
    <div class="list-layout-3">
      <div class="panel">
        <div class="panel-head">
          <h3>Levels</h3>
          ${isMod() ? `<button class="btn small primary" onclick="openGenericModal('${kind}')">+ Add ${escapeHtml(cfg.noun)}</button>` : ''}
        </div>
        ${data.length ? toolbar : ''}
        <div class="demon-rows">${rows}</div>
      </div>
      <div class="panel"><div class="detail">${detail}</div></div>
    </div>

  if(preserveFocus){
    const s = document.getElementById(cfg.searchId);
    if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
  }
  animateCounters(el);
}

function openGenericModal(kind, id){

  const cfg = LIST_KINDS[kind];
  const editing = id ? glData(kind).find(d=>d.id===id) : null;
  openModal(`
  <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="modal">

async function saveGenericForm(kind, id){
  const cfg = LIST_KINDS[kind];
  const name = document.getElementById('gl-name').value.trim();
  if(!name) return;
  const rawTags = document.getElementById('gl-tags').value;
  const tags = rawTags.split(',').map(t=>t.trim()).filter(Boolean);
  const points = parseInt(document.getElementById('gl-points').value) || 0;
  const data = {
    name,
    creator: document.getElementById('gl-creator').value.trim(),
    verifier: document.getElementById('gl-verifier').value.trim(),
    country: document.getElementById('gl-country').value,
    points,
    video: document.getElementById('gl-video').value.trim(),
    levelId: document.getElementById('gl-levelid').value.trim(),
    publishDate: document.getElementById('gl-publishdate').value,
    description: document.getElementById('gl-desc').value.trim(),
    tags
  };
  const data2 = glData(kind);
  if(id){
    const d = data2.find(x=>x.id===id);
    Object.assign(d, data);
    logChange(`"${data.name}" (${cfg.noun}) was edited`, true);
  }else{
    data2.push({ id: uid(), ...data, addedAt: Date.now() });
    glSetSelId(kind, data2[data2.length-1].id);
    logChange(`"${data.name}" was added to the ${cfg.title} at #${data2.length}`);
  }
  await glSave(kind);
  closeModal();
  renderAll();
  showToast(id ? `${cfg.noun} updated` : `${cfg.noun} added`);
}
async function deleteGenericItem(kind, id){
  const cfg = LIST_KINDS[kind];
  const data = glData(kind);
  const d = data.find(x=>x.id===id);
  const ok = await customConfirm(`Remove "${d?d.name:'this level'}" from the ${cfg.title}? This cannot be undone.`, `Delete ${cfg.noun}`);
  if(!ok) return;
  const remaining = data.filter(x=>x.id!==id);
  APP[cfg.dataKey] = remaining;
  if(glSelId(kind)===id) glSetSelId(kind, remaining[0]?.id || null);
  await glSave(kind);
  if(d) logChange(`"${d.name}" was removed from the ${cfg.title}`, true);
  renderAll();
  showToast(`${cfg.noun} deleted`);
}
async function moveGenericItem(kind, id, dir){
  const data = glData(kind);
  const i = data.findIndex(d=>d.id===id);
  const j = i+dir;
  if(j<0 || j>=data.length) return;
  const d = data[i];
  [data[i], data[j]] = [data[j], data[i]];
  await glSave(kind);
  logChange(`"${d.name}" moved from #${i+1} to #${j+1} on the ${LIST_KINDS[kind].title}`, true);
  renderGenericListTab(kind);
}

      ${rl.history.length ? `<div class="panel roulette-history"><div class="panel-head"><h3>Run History</h3><button class="btn small ghost" onclick="resetRoulette()">Reset Run</button></div><div>${history}</div></div>` : ''}

  `;

function saveRouletteLocal(){ try{ localStorage.setItem('demonlist_roulette', JSON.stringify(APP.roulette)); }catch(e){} }
function loadRouletteLocal(){
  try{
    const raw = localStorage.getItem('demonlist_roulette');
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed === 'object') APP.roulette = Object.assign({ required:1, current:null, usedIds:[], history:[], done:false, streak:0, bestStreak:0 }, parsed);
    }
  }catch(e){}
}
function spinRoulette(btn){
  const rl = APP.roulette;
  let pool = APP.demons.filter(d => !rl.usedIds.includes(d.id));
  if(pool.length===0){ rl.usedIds = []; pool = APP.demons; }
  const pick = pool[Math.floor(Math.random()*pool.length)];
  rl.current = pick;
  rl.usedIds.push(pick.id);
  saveRouletteLocal();
  if(btn) btn.classList.add('spinning');
  setTimeout(renderRouletteTab, btn ? 220 : 0);
}
function submitRoulettePercent(){
  const input = document.getElementById('rl-percent');
  const val = parseInt(input.value);
  const rl = APP.roulette;
  const fb = document.getElementById('rl-feedback');
  if(isNaN(val) || val<1 || val>100){ fb.textContent = 'Enter a percent between 1 and 100.'; fb.className='roulette-feedback fail'; return; }

  const required = rl.required;
  const pass = val >= required;
  rl.history.push({ name: rl.current.name, required, achieved: val, result: pass ? 'pass':'fail' });

  if(pass){
    rl.streak = (rl.streak||0) + 1;
    rl.bestStreak = Math.max(rl.bestStreak||0, rl.streak);
    if(val >= 100){
      fb.textContent = 'Roulette cleared! Starting a new run at 1%.';
      fb.className = 'roulette-feedback pass';
      rl.required = 1;
    }else{
      rl.required = Math.min(100, val+1);
      fb.textContent = `Cleared! Next requirement: ${rl.required}%.`;
      fb.className = 'roulette-feedback pass';
    }
    rl.current = null;
  }else{
    rl.streak = 0;
    fb.textContent = `Short of ${required}% — run reset to 1%.`;
    fb.className = 'roulette-feedback fail';
    rl.required = 1;
    rl.current = null;
  }
  saveRouletteLocal();
  setTimeout(renderRouletteTab, pass ? 300 : 900);
}
function resetRoulette(){
  APP.roulette = { required: 1, current: null, usedIds: [], history: [], done:false, streak:0, bestStreak: APP.roulette.bestStreak||0 };
  saveRouletteLocal();
  renderRouletteTab();
}

function getFilteredSortedPlayers(){
  const { search, sort } = APP.lbFilter;
  const q = search.trim().toLowerCase();
  let list = APP.players.slice();
  if(q) list = list.filter(p => p.name.toLowerCase().includes(q) || countryName(p.country).toLowerCase().includes(q));
  if(sort === 'az') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort === 'za') list.sort((a,b)=>b.name.localeCompare(a.name));
  else list.sort((a,b)=>b.points-a.points); // points desc default
  return list;
}
function exportLeaderboardCsv(){
  const sorted = APP.players.slice().sort((a,b)=>b.points-a.points);
  if(!sorted.length){ showToast('No players to export', 'error'); return; }
  const header = 'Rank,Name,Region,Points\n';
  const rows = sorted.map((p,i) => `${i+1},"${(p.name||'').replace(/"/g,'""')}",${countryName(p.country)},${p.points}`).join('\n');
  const blob = new Blob([header+rows], { type:'text/csv' });

function getPeriodStandings(period){
  const now = Date.now();
  const DAY = 24*60*60*1000;
  const since = period==='year' ? now - 365*DAY : period==='week' ? now - 7*DAY : now - 30*DAY;
  const gains = {};
  APP.submissions.forEach(s => {
    if(s.status!=='approved' || s.type==='progress' || s.submittedAt < since) return;
    const demon = APP.demons.find(d=>d.id===s.demonId);
    if(!demon) return;
    let awarded = demon.points;
    if(demon.requirement2 && s.percent < (demon.requirement||100) && s.percent >= demon.requirement2) awarded = demon.points2 || 0;
    if(!gains[s.player]) gains[s.player] = { player: s.player, country: s.country, points: 0, records: 0 };
    gains[s.player].points += awarded;
    gains[s.player].records += 1;
  });
  return Object.values(gains).sort((a,b)=>b.points-a.points);
}
function getNationStandings(){
  const byCountry = {};
  APP.players.forEach(p => {
    const c = p.country || 'OTHER';
    if(!byCountry[c]) byCountry[c] = { country: c, points: 0, players: 0, best: null };
    byCountry[c].points += (p.points||0);
    byCountry[c].players += 1;
    if(!byCountry[c].best || p.points > byCountry[c].best.points) byCountry[c].best = p;
  });
  return Object.values(byCountry).sort((a,b)=>b.points-a.points);
}
function getRecentRecords(limit){
  return APP.submissions.filter(s=>s.status==='approved' && s.type!=='progress').slice().reverse().slice(0, limit||25);
}

  const rankOf = id => allSorted.findIndex(p=>p.id===id);
  const filtered = getFilteredSortedPlayers();
  const rankClass = i => i===0?'r1':i===1?'r2':i===2?'r3':'';

  const viewToggle = `

    body = `

      <tr class="player-row-click" onclick="openPlayerProfile('${p.id}')">
        <td class="lb-rank ${rankClass(i)}">#${i+1}</td>

/* ============================= STATS TAB ============================= */
function renderStatsTab(){
  const el = document.getElementById('panel-stats');
  if(!el) return;
  const demons = APP.demons;
  const mainSize = APP.settings.mainListSize || 50;
  const totalPoints = demons.reduce((s,d)=>s+(d.points||0),0);
  const avgPoints = demons.length ? Math.round(totalPoints/demons.length) : 0;
  const hardest = demons[0];
  const easiest = demons[demons.length-1];
  const legacyCount = Math.max(0, demons.length - mainSize);
  const newest = demons.slice().sort((a,b)=>(b.addedAt||0)-(a.addedAt||0))[0];
  const totalEarned = APP.players.reduce((s,p)=>s+(p.points||0),0);
  const approvedRecords = APP.submissions.filter(s=>s.status==='approved' && s.type!=='progress');
  const pendingCount = APP.submissions.filter(s=>s.status==='pending').length;

  const nations = getNationStandings();
  const topNation = nations[0];

  const recordCounts = {};
  approvedRecords.forEach(s => { recordCounts[s.player] = (recordCounts[s.player]||0)+1; });
  let mostActive = null, mostActiveCount = 0;
  Object.entries(recordCounts).forEach(([name,c]) => { if(c>mostActiveCount){ mostActive = name; mostActiveCount = c; } });

  // Most verified creator: creator with the most levels on the list
  const creatorCounts = {};
  demons.forEach(d => { if(d.creator) creatorCounts[d.creator] = (creatorCounts[d.creator]||0)+1; });
  let mostVerifiedCreator = null, mostVerifiedCreatorCount = 0;
  Object.entries(creatorCounts).forEach(([name,c]) => { if(c>mostVerifiedCreatorCount){ mostVerifiedCreator = name; mostVerifiedCreatorCount = c; } });

  // Hardest verifier: verifier whose demons average the highest placement (lowest rank index = hardest)
  const verifierRanks = {};
  demons.forEach((d,i) => { if(d.verifier){ (verifierRanks[d.verifier]=verifierRanks[d.verifier]||[]).push(i); } });
  let hardestVerifier = null, hardestVerifierAvg = Infinity;
  Object.entries(verifierRanks).forEach(([name,ranks]) => {
    const avg = ranks.reduce((s,r)=>s+r,0)/ranks.length;
    if(avg < hardestVerifierAvg){ hardestVerifierAvg = avg; hardestVerifier = name; }
  });

  // Per-demon record counts, for most/least completed and completion rate
  const perDemonCounts = {};
  approvedRecords.forEach(s => { perDemonCounts[s.demonId] = (perDemonCounts[s.demonId]||0)+1; });
  const demonsWithRecords = demons.filter(d => perDemonCounts[d.id]).length;
  const completionRate = demons.length ? Math.round((demonsWithRecords/demons.length)*100) : 0;
  let mostCompletedDemon = null, mostCompletedCount = -1;
  let leastCompletedDemon = null, leastCompletedCount = Infinity;
  demons.forEach(d => {
    const c = perDemonCounts[d.id]||0;
    if(c > mostCompletedCount){ mostCompletedCount = c; mostCompletedDemon = d; }
    if(c < leastCompletedCount){ leastCompletedCount = c; leastCompletedDemon = d; }
  });

  // Point distribution buckets
  const bucketSize = 25;
  const buckets = {};
  demons.forEach(d => {
    const b = Math.floor((d.points||0)/bucketSize)*bucketSize;
    buckets[b] = (buckets[b]||0)+1;
  });
  const bucketKeys = Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  const maxBucketCount = Math.max(1, ...bucketKeys.map(k=>buckets[k]));
  const distGraphHtml = bucketKeys.length ? `
    <div style="display:flex;align-items:flex-end;gap:6px;height:110px;padding:8px 4px 0;">
      ${bucketKeys.map(k => `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;" title="${buckets[k]} demon(s) at ${k}-${k+bucketSize-1}pt">
          <div style="font-size:10px;color:var(--text-dim);">${buckets[k]}</div>
          <div style="width:100%;background:var(--spike);border-radius:4px 4px 0 0;height:${Math.max(4,(buckets[k]/maxBucketCount)*70)}px;"></div>
          <div style="font-size:9.5px;color:var(--text-dim);white-space:nowrap;">${k}+</div>
        </div>`).join('')}
    </div>` : `<div class="completion-item" style="color:var(--text-dim);">No demons yet.</div>`;

  const recentDemons = demons.slice().sort((a,b)=>(b.addedAt||0)-(a.addedAt||0)).slice(0,5);
  const recentHtml = recentDemons.length ? recentDemons.map(d => {
    const rank = demons.findIndex(x=>x.id===d.id);
    return `<div class="completion-item"><span>#${rank+1} ${escapeHtml(d.name)}</span><span style="color:var(--text-dim);">${d.points}pt${d.addedAt ? ' · '+new Date(d.addedAt).toLocaleDateString() : ''}</span></div>`;
  }).join('') : `<div class="completion-item" style="color:var(--text-dim);">No demons added yet.</div>`;

  el.innerHTML = `
    <div class="page-head">
      <h1 class="page-title">List Statistics</h1>
      <p class="page-desc">An overview of the list, its players, and recent activity — similar to a stats viewer on other demon lists.</p>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-val">${demons.length}</div><div class="sc-lbl">Total Demons</div></div>
      <div class="stat-card"><div class="sc-val">${legacyCount}</div><div class="sc-lbl">Legacy Demons</div></div>
      <div class="stat-card"><div class="sc-val">${totalPoints}</div><div class="sc-lbl">Points Available</div></div>
      <div class="stat-card"><div class="sc-val">${avgPoints}</div><div class="sc-lbl">Avg Points / Demon</div></div>
      <div class="stat-card"><div class="sc-val">${APP.players.length}</div><div class="sc-lbl">Players</div></div>
      <div class="stat-card"><div class="sc-val">${totalEarned}</div><div class="sc-lbl">Total Points Earned</div></div>
      <div class="stat-card"><div class="sc-val">${approvedRecords.length}</div><div class="sc-lbl">Approved Records</div></div>
      <div class="stat-card"><div class="sc-val">${completionRate}%</div><div class="sc-lbl">Completion Rate</div></div>
      ${isMod() ? `<div class="stat-card"><div class="sc-val">${pendingCount}</div><div class="sc-lbl">Pending Review</div></div>` : ''}
    </div>
    <div class="list-layout">
      <div class="panel">
        <div class="panel-head"><h3>List Highlights</h3></div>
        <div style="padding:12px;">
          <div class="completion-item"><span>#1 Hardest</span><span style="color:var(--text-dim);">${hardest?escapeHtml(hardest.name):'—'}</span></div>
          <div class="completion-item"><span>Easiest on the list</span><span style="color:var(--text-dim);">${easiest?escapeHtml(easiest.name):'—'}</span></div>
          <div class="completion-item"><span>Newest addition</span><span style="color:var(--text-dim);">${newest?escapeHtml(newest.name):'—'}</span></div>
          <div class="completion-item"><span>Top nation</span><span style="color:var(--text-dim);">${topNation?flagEmoji(topNation.country)+' '+escapeHtml(countryName(topNation.country))+' ('+topNation.points+'pt)':'—'}</span></div>
          <div class="completion-item"><span>Most active player</span><span style="color:var(--text-dim);">${mostActive?escapeHtml(mostActive)+' ('+mostActiveCount+' records)':'—'}</span></div>
          <div class="completion-item"><span>Most verified creator</span><span style="color:var(--text-dim);">${mostVerifiedCreator?escapeHtml(mostVerifiedCreator)+' ('+mostVerifiedCreatorCount+' levels)':'—'}</span></div>
          <div class="completion-item"><span>Hardest verifier</span><span style="color:var(--text-dim);">${hardestVerifier?escapeHtml(hardestVerifier):'—'}</span></div>
          <div class="completion-item"><span>Most completed demon</span><span style="color:var(--text-dim);">${mostCompletedDemon&&mostCompletedCount>0?escapeHtml(mostCompletedDemon.name)+' ('+mostCompletedCount+')':'—'}</span></div>
          <div class="completion-item"><span>Least completed demon</span><span style="color:var(--text-dim);">${leastCompletedDemon?escapeHtml(leastCompletedDemon.name)+' ('+leastCompletedCount+')':'—'}</span></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Recently Added</h3></div>
        <div>${recentHtml}</div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Point Distribution</h3></div>
        ${distGraphHtml}
      </div>
    </div>
  `;
}

/* ============================= PLAYER PROFILE ============================= */
function openPlayerProfile(id){
  const p = APP.players.find(x=>x.id===id);
  if(!p) return;
  const ranked = APP.players.slice().sort((a,b)=>b.points-a.points);
  const rank = ranked.findIndex(x=>x.id===id) + 1;
  const above = rank > 1 ? ranked[rank-2] : null;
  const nextMilestone = (Math.floor(p.points/100)+1)*100;
  const toMilestone = nextMilestone - p.points;
  const toOvertake = above ? Math.max(0, above.points - p.points + 1) : 0;
  const beaten = APP.submissions.filter(s => s.status==='approved' && s.type!=='progress' && s.player.toLowerCase()===p.name.toLowerCase());
  const totalDemons = APP.demons.length;
  const pct = totalDemons ? Math.round((beaten.length/totalDemons)*100) : 0;
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);

  const beatenWithRank = beaten.map(s => {
    const demon = APP.demons.find(d=>d.id===s.demonId);
    const rankIdx = demon ? APP.demons.findIndex(d=>d.id===demon.id) : -1;
    return { s, demon, rankIdx };
  }).filter(x => x.demon);

  const hardest = beatenWithRank.slice().sort((a,b)=>a.rankIdx-b.rankIdx)[0];
  const avgPlacement = beatenWithRank.length ? Math.round(beatenWithRank.reduce((sum,x)=>sum+x.rankIdx+1,0) / beatenWithRank.length) : null;
  const mainCount = beatenWithRank.filter(x=>x.rankIdx < mainSize).length;
  const extCount = beatenWithRank.filter(x=>x.rankIdx >= mainSize && x.rankIdx < extSize).length;
  const legacyCount = beatenWithRank.filter(x=>x.rankIdx >= extSize).length;

  const beatenHtml = beatenWithRank.length ? beatenWithRank.slice().sort((a,b)=>a.rankIdx-b.rankIdx).map(({s,demon,rankIdx}) => {
    const tier = rankIdx<mainSize?'Main':rankIdx<extSize?'Extended':'Legacy';
    return `<div class="completion-item" style="cursor:pointer;" onclick="closeModal();selectDemon('${demon.id}');switchTab('list');"><span>#${rankIdx+1} ${escapeHtml(demon.name)}</span><span style="color:var(--text-dim);">${s.percent}% · ${demon.points}pt · ${tier}</span></div>`;
  }).join('') : `<div class="completion-item" style="color:var(--text-dim);">No approved completions on record yet.</div>`;

  const progressBests = p.progressBests || {};
  const progressEntries = Object.entries(progressBests)
    .map(([demonId, percent]) => ({ demon: APP.demons.find(d=>d.id===demonId), percent }))
    .filter(x => x.demon && !beaten.some(s=>s.demonId===x.demon.id));
  const progressHtml = progressEntries.length ? progressEntries.map(x => {
    const rankIdx = APP.demons.findIndex(d=>d.id===x.demon.id);
    return `<div class="completion-item" style="cursor:pointer;" onclick="closeModal();selectDemon('${x.demon.id}');switchTab('list');"><span>#${rankIdx+1} ${escapeHtml(x.demon.name)}</span><span style="color:var(--text-dim);">Best: ${x.percent}%</span></div>`;
  }).join('') : '';

  const account = APP.registeredUsers.find(u => u.username.toLowerCase() === p.name.toLowerCase());
  const joinedLabel = account && account.createdAt ? new Date(account.createdAt).toLocaleDateString(undefined,{year:'numeric',month:'long'}) : null;

  // Completion graph: completions per month, last 6 months
  const now = new Date();
  const months = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-(5-i), 1);
    return { key: d.getFullYear()+'-'+d.getMonth(), label: d.toLocaleDateString(undefined,{month:'short'}) };
  });
  const monthCounts = months.map(m => beaten.filter(s => {
    const d = new Date(s.submittedAt);
    return (d.getFullYear()+'-'+d.getMonth()) === m.key;
  }).length);
  const maxCount = Math.max(...monthCounts, 1);
  const graphBars = months.map((m,i) => {
    const h = Math.round((monthCounts[i]/maxCount) * 32) + (monthCounts[i]>0?4:1);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;"><div title="${monthCounts[i]} completion(s) in ${m.label}" style="width:70%;height:${h}px;background:${monthCounts[i]>0?'var(--spike)':'var(--line)'};border-radius:2px 2px 0 0;"></div><span style="font-size:9px;color:var(--text-dim);">${m.label}</span></div>`;
  }).join('');
  const graphHtml = beaten.length ? `
    <div class="field"><label>Completion Activity — last 6 months</label></div>
    <div class="panel" style="padding:10px 12px;display:flex;align-items:flex-end;gap:4px;height:60px;">${graphBars}</div>` : '';

  openModal(`
  <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${flagEmoji(p.country)} ${escapeHtml(p.name)}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="stat-row" style="margin-top:0;">

function copyProfileLink(id){

function downloadProfileCard(id){
  const p = APP.players.find(x=>x.id===id);
  if(!p) return;
  const rank = APP.players.slice().sort((a,b)=>b.points-a.points).findIndex(x=>x.id===id) + 1;
  const beaten = APP.submissions.filter(s => s.status==='approved' && s.type!=='progress' && s.player.toLowerCase()===p.name.toLowerCase()).length;
  const isLight = document.body.classList.contains('light-theme');
  const bg = isLight ? '#ffffff' : '#11131a';
  const bg2 = isLight ? '#f3f4f6' : '#171a24';
  const text = isLight ? '#111827' : '#e4e6eb';
  const muted = isLight ? '#4b5563' : '#82879c';
  const accent = '#ff3b6b';
  const gold = '#ffb845';
  const canvas = document.createElement('canvas');
  canvas.width = 1000; canvas.height = 520;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = bg2; ctx.fillRect(0,0,canvas.width,10);
  ctx.fillStyle = accent; ctx.fillRect(0,0,10,canvas.height);
  ctx.fillStyle = muted; ctx.font = '600 22px Inter, sans-serif';
  ctx.fillText((APP.settings.siteName||'Demon List').toUpperCase(), 60, 80);
  ctx.fillStyle = text; ctx.font = '700 64px Inter, sans-serif';
  ctx.fillText(`${flagEmoji(p.country)}  ${p.name}`, 60, 175);
  ctx.fillStyle = accent; ctx.font = '700 40px "JetBrains Mono", monospace';
  ctx.fillText('#'+rank, 60, 240);
  ctx.fillStyle = muted; ctx.font = '500 20px Inter, sans-serif';
  ctx.fillText('LEADERBOARD RANK', 60, 268);
  const stats = [[String(p.points), 'POINTS', gold], [String(beaten), 'DEMONS BEATEN', text]];
  let sx = 60;
  stats.forEach(([val,label,color]) => {
    ctx.fillStyle = color; ctx.font = '700 44px "JetBrains Mono", monospace';
    ctx.fillText(val, sx, 360);
    ctx.fillStyle = muted; ctx.font = '500 16px Inter, sans-serif';
    ctx.fillText(label, sx, 388);
    sx += 260;
  });
  ctx.fillStyle = muted; ctx.font = '500 18px Inter, sans-serif';
  ctx.fillText(location.origin + location.pathname + '#player-' + p.id, 60, 470);
  const a = document.createElement('a');
  a.download = p.name.replace(/[^a-z0-9]/gi,'_') + '_profile_card.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('Profile card downloaded');
}

let BULK_SELECTED = new Set();
function toggleBulkSelect(id, ev){
  if(ev) ev.stopPropagation();
  if(BULK_SELECTED.has(id)) BULK_SELECTED.delete(id); else BULK_SELECTED.add(id);
  renderSubmitTab();
}
function toggleBulkSelectAll(pendingIds){
  const allSelected = pendingIds.length && pendingIds.every(id => BULK_SELECTED.has(id));
  if(allSelected) pendingIds.forEach(id => BULK_SELECTED.delete(id));
  else pendingIds.forEach(id => BULK_SELECTED.add(id));
  renderSubmitTab();
}
async function bulkReviewSelected(status){
  const ids = Array.from(BULK_SELECTED).filter(id => APP.submissions.some(s=>s.id===id && s.status==='pending'));
  if(!ids.length) return;
  const ok = await customConfirm(`${status==='approved'?'Approve':'Reject'} ${ids.length} selected submission(s)?`);
  if(!ok) return;
  for(const id of ids){ await reviewSubmission(id, status, true); }
  BULK_SELECTED.clear();
  await savePlayers();
  await saveSubmissions();
  renderAll();
  showToast(`${ids.length} submissions ${status}`, status==='approved'?'ok':'error');
}
function setSubStatusFilter(status){ APP.subFilter.status = status; renderSubmitTab(); }
function setSubSearch(v){ APP.subFilter.search = v; renderSubmitTab(true); }
function renderSubmitTab(preserveFocus){

  const demonOptions = APP.demons.map(d => `<option value="${d.id}">${escapeHtml(d.name)} (${d.points}pt)</option>`).join('');
  let queue = APP.submissions.slice().reverse();
  const { status, search } = APP.subFilter;
  if(status !== 'all') queue = queue.filter(s => s.status === status);
  const q = search.trim().toLowerCase();
  if(q){
    queue = queue.filter(s => {
      const demon = APP.demons.find(d=>d.id===s.demonId);
      return s.player.toLowerCase().includes(q) || (demon && demon.name.toLowerCase().includes(q));
    });
  }
  const counts = {
    all: APP.submissions.length,
    pending: APP.submissions.filter(s=>s.status==='pending').length,
    approved: APP.submissions.filter(s=>s.status==='approved').length,
    rejected: APP.submissions.filter(s=>s.status==='rejected').length
  };

  const pendingIdsOnScreen = queue.filter(s=>s.status==='pending').map(s=>s.id);
  const allOnScreenSelected = pendingIdsOnScreen.length && pendingIdsOnScreen.every(id=>BULK_SELECTED.has(id));
  const bulkBar = (isMod() && pendingIdsOnScreen.length) ? `
    <div class="bulk-bar">

      ${BULK_SELECTED.size ? `
      <span class="hint">${BULK_SELECTED.size} selected</span>
      <button class="btn small primary" onclick="bulkReviewSelected('approved')">Approve selected</button>
      <button class="btn small danger" onclick="bulkReviewSelected('rejected')">Reject selected</button>` : ''}
    </div>` : '';
  const queueHtml = queue.length ? queue.map(s => {
    const demon = APP.demons.find(d=>d.id===s.demonId);
    const embed = getEmbedUrl(s.video);
    return `
    <div class="sub-item">
      <div class="sub-item-top">
        <div style="display:flex;align-items:center;gap:8px;">
          ${isMod() && s.status==='pending' ? `<input type="checkbox" ${BULK_SELECTED.has(s.id)?'checked':''} onclick="toggleBulkSelect('${s.id}', event)">` : ''}
          <div>
            <span class="who">${escapeHtml(s.player)}</span>
            <span class="what"> — ${demon?escapeHtml(demon.name):'(deleted demon)'} · ${s.percent}%${s.type==='progress'?' <span class="status-pill pending">progress</span>':''}</span>
          </div>
        </div>
        <span class="status-pill ${s.status}">${s.status}</span>
      </div>
      ${s.note ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px; font-style:italic;">"${escapeHtml(s.note)}"</div>` : ''}
      ${s.attempts ? `<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:2px;">${s.attempts.toLocaleString()} attempts</div>` : ''}
      <a class="sub-link" href="${escapeHtml(s.video)}" target="_blank">Watch submission ↗</a>
      ${embed ? ` · <a class="sub-link" href="javascript:void(0)" onclick="this.closest('.sub-item').querySelector('.sub-embed-wrap').classList.toggle('open')">▶ Preview inline</a>` : ''}
      ${s.rawFootage ? ` · <a class="sub-link" href="${escapeHtml(s.rawFootage)}" target="_blank">Raw footage ↗</a>` : ''}
      ${embed ? `<div class="sub-embed-wrap"><div class="video-wrap"><iframe src="${embed}" allowfullscreen loading="lazy"></iframe></div></div>` : ''}
      ${isMod() ? `
      <div class="field" style="margin-top:6px;margin-bottom:0;">
        <textarea placeholder="Private moderator notes (not visible to the player)" style="font-size:11.5px;min-height:40px;" onchange="setModNote('${s.id}', this.value)">${escapeHtml(s.modNote||'')}</textarea>
      </div>` : ''}
      ${isMod() && s.status==='pending' ? `
      <div class="sub-actions">
        <button class="btn small primary" onclick="reviewSubmission('${s.id}','approved')">Approve</button>
        <button class="btn small danger" onclick="reviewSubmission('${s.id}','rejected')">Reject</button>
      </div>` : ''}
    </div>`;
  }).join('') : `<div class="empty-state"><div class="big">No submissions${status!=='all'||q?' match':' yet'}</div>${status!=='all'||q ? 'Try clearing the filters.' : 'Plays sent for review will show up here.'}</div>`;

  el.innerHTML = `
    <div class="page-head">
      <h1 class="page-title">Submit a Play</h1>
      <p class="page-desc">Send a video of your run to the list moderators. Approved plays award the demon's points to your leaderboard total.</p>
    </div>
    <div class="list-layout" ${isMod() ? '' : 'style="grid-template-columns:1fr;"'}>
      <div class="panel">
        <div class="panel-head"><h3>New Submission</h3></div>
        <div style="padding:14px;">
          ${APP.demons.length ? `
          <div class="field"><label>Your Player Name</label><input id="sb-player" list="knownPlayers" value="${APP.currentUser?escapeHtml(APP.currentUser.username):''}"></div>
          <datalist id="knownPlayers">${APP.players.map(p=>`<option value="${escapeHtml(p.name)}">`).join('')}</datalist>
          <div class="field"><label>Demon</label><select id="sb-demon" onchange="updateSubRequirementHint()">${demonOptions}</select></div>
          <div class="form-grid">
            <div class="field"><label>Percent</label><input id="sb-percent" type="number" min="1" max="100" value="100"></div>
            <div class="field"><label>Region</label><select id="sb-country">${countryOptions('US')}</select></div>
          </div>
          <div class="req-hint" id="subReqHint"></div>
          <div class="field"><label>Video URL</label><input id="sb-video" placeholder="https://youtube.com/..."></div>
          <div class="form-grid">
            <div class="field"><label>Attempts <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="sb-attempts" type="number" min="1" placeholder="e.g. 4200"></div>
            <div class="field"><label>Raw Footage URL <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="sb-rawfootage" placeholder="Google Drive / Dropbox link"></div>
          </div>
          <div class="field"><label>Note (optional)</label><textarea id="sb-note" placeholder="Anything moderators should know"></textarea></div>
          <div class="panel-head" style="margin:10px 0 4px;padding:0;border:none;"><h3>Rate the Level</h3></div>
          <p class="hint" style="margin-bottom:6px;">Optional — these ratings show up next to your record on the level's page.</p>
          <div class="form-grid" style="grid-template-columns:repeat(3,1fr);">
            <div class="field"><label>Enjoyment (1-10)</label><input id="sb-enjoyment" type="number" min="1" max="10" placeholder="e.g. 8"></div>
            <div class="field"><label>Deco (1-10)</label><input id="sb-deco" type="number" min="1" max="10" placeholder="e.g. 9"></div>
            <div class="field"><label>Gameplay (1-10)</label><input id="sb-gameplay" type="number" min="1" max="10" placeholder="e.g. 7"></div>
          </div>
          <button class="btn primary" style="width:100%;" onclick="submitPlay()">Send for Review</button>
          <div id="submitMsg"></div>
          ` : `<div class="empty-state">Add demons to the list first.</div>`}
        </div>
      </div>
      ${isMod() ? `
      <div class="panel">
        <div class="panel-head"><h3>Queue</h3></div>
        ${APP.submissions.length ? `
        <div class="status-filter-row">
          <button class="status-filter-btn ${status==='all'?'active':''}" onclick="setSubStatusFilter('all')">All (${counts.all})</button>
          <button class="status-filter-btn ${status==='pending'?'active':''}" onclick="setSubStatusFilter('pending')">Pending (${counts.pending})</button>
          <button class="status-filter-btn ${status==='approved'?'active':''}" onclick="setSubStatusFilter('approved')">Approved (${counts.approved})</button>
          <button class="status-filter-btn ${status==='rejected'?'active':''}" onclick="setSubStatusFilter('rejected')">Rejected (${counts.rejected})</button>
        </div>
        <div class="list-toolbar" style="border-bottom:none;">
          <div class="search-input-wrap">
            <span class="si-icon">⌕</span>
            <input id="sub-search" placeholder="Search player or level..." value="${escapeHtml(search)}" oninput="setSubSearch(this.value)">
          </div>
        </div>` : ''}
        ${bulkBar}
        <div class="sub-list demon-rows" style="max-height:none;">${queueHtml}</div>
      </div>` : ''}
    </div>
  `;
  if(preserveFocus){
    const s = document.getElementById('sub-search');
    if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
  }
  updateSubRequirementHint();
}
function updateSubRequirementHint(){
  const sel = document.getElementById('sb-demon');
  const hint = document.getElementById('subReqHint');
  if(!sel || !hint) return;
  const demon = APP.demons.find(d=>d.id===sel.value);
  const req = demon && demon.requirement ? demon.requirement : 100;
  let text = req < 100 ? `This demon accepts records of ${req}% or higher.` : `This demon requires a 100% completion.`;
  if(demon && demon.requirement2){
    text += ` Records from ${demon.requirement2}% up to ${req-1}% are accepted for ${demon.points2||0} reduced points instead of the full ${demon.points}.`;
  }
  hint.textContent = text;
}
async function submitPlay(){
  const player = document.getElementById('sb-player').value.trim();
  const demonId = document.getElementById('sb-demon').value;
  const percent = parseInt(document.getElementById('sb-percent').value);
  const video = document.getElementById('sb-video').value.trim();
  const country = document.getElementById('sb-country').value;
  const note = document.getElementById('sb-note').value.trim();
  const attemptsRaw = parseInt(document.getElementById('sb-attempts').value);
  const attempts = isNaN(attemptsRaw) ? null : Math.max(1, attemptsRaw);
  const rawFootage = document.getElementById('sb-rawfootage').value.trim();
  const clampRating = v => (isNaN(v) || v<1 || v>10) ? null : v;
  const enjoymentRating = clampRating(parseInt(document.getElementById('sb-enjoyment').value));
  const decoRating = clampRating(parseInt(document.getElementById('sb-deco').value));
  const gameplayRating = clampRating(parseInt(document.getElementById('sb-gameplay').value));
  const msgEl = document.getElementById('submitMsg');
  if(!player || !video || isNaN(percent) || percent<1 || percent>100){
    msgEl.innerHTML = `<div class="msg error">Fill in your name, a percent (1-100), and a video URL.</div>`;
    return;
  }
  const demon = APP.demons.find(d=>d.id===demonId);
  const req = demon && demon.requirement ? demon.requirement : 100;
  const floor = (demon && demon.requirement2) ? demon.requirement2 : req;
  const type = percent < floor ? 'progress' : 'completion';
  APP.submissions.push({ id: uid(), player, demonId, percent, video, country, note, attempts, rawFootage, enjoymentRating, decoRating, gameplayRating, status:'pending', type, submittedAt: Date.now(), modNote:'' });
  await saveSubmissions();
  msgEl.innerHTML = type==='progress'
    ? `<div class="msg ok">Submitted as a progress record (below the ${floor}% requirement, so it won't award points, but it'll be tracked on your profile once approved). A moderator will review it soon.</div>`
    : `<div class="msg ok">Submitted! A moderator will review it soon.</div>`;
  renderSubmitTab();
}
async function setModNote(id, value){
  if(!isMod()) return;
  const s = APP.submissions.find(x=>x.id===id);
  if(!s) return;
  s.modNote = value;
  await saveSubmissions();
}
async function reviewSubmission(id, status, silent){
  if(!isMod()) return;
  const s = APP.submissions.find(x=>x.id===id);
  if(!s) return;
  s.status = status;
  const demon = APP.demons.find(d=>d.id===s.demonId);
  if(status==='approved'){
    let player = APP.players.find(p=>p.name.toLowerCase()===s.player.toLowerCase());
    if(!player){
      player = { id: uid(), name: s.player, country: s.country||'OTHER', points: 0, addedAt: Date.now() };
      APP.players.push(player);
    }
    if(s.type === 'progress'){
      if(!player.progressBests) player.progressBests = {};
      const prev = player.progressBests[s.demonId] || 0;
      if(s.percent > prev) player.progressBests[s.demonId] = s.percent;
    } else if(demon){
      let awarded = demon.points;
      if(demon.requirement2 && s.percent < (demon.requirement||100) && s.percent >= demon.requirement2){
        awarded = demon.points2 || 0;
      }
      player.points += awarded;
    }
    if(!silent) await savePlayers();
    if(demon && s.enjoymentRating){
      if(!demon.enjoymentRatings) demon.enjoymentRatings = {};
      demon.enjoymentRatings[s.player.toLowerCase()] = s.enjoymentRating;
      if(!silent) await saveDemons();
    }
  }
  logChange(`${s.player}'s ${s.type==='progress'?'progress ':''}submission on "${demon?demon.name:'a deleted demon'}" (${s.percent}%) was ${status}`, true);
  if(!silent){
    await saveSubmissions();
    renderAll();
    showToast(status==='approved' ? 'Submission approved' : 'Submission rejected', status==='approved'?'ok':'error');
  }
}

/* ============================= SUBMIT LEVEL TAB (community level submissions for any list) ============================= */
const LEVEL_SUB_TARGETS = { main: 'Demon List', challenge: 'Challenge List', platformer: 'Platformer Demon List' };
function setLevelSubStatusFilter(status){ APP.levelSubFilter.status = status; renderSubmitLevelTab(); }
function setLevelSubSearch(v){ APP.levelSubFilter.search = v; renderSubmitLevelTab(true); }
function renderSubmitLevelTab(preserveFocus){
  const el = document.getElementById('panel-submitlevel');
  if(!el) return;
  let queue = APP.levelSubmissions.slice().reverse();
  const { status, search } = APP.levelSubFilter;
  if(status !== 'all') queue = queue.filter(s => s.status === status);
  const q = search.trim().toLowerCase();
  if(q) queue = queue.filter(s => s.levelName.toLowerCase().includes(q) || (s.creator||'').toLowerCase().includes(q) || (s.submitter||'').toLowerCase().includes(q));
  const counts = {
    all: APP.levelSubmissions.length,
    pending: APP.levelSubmissions.filter(s=>s.status==='pending').length,
    approved: APP.levelSubmissions.filter(s=>s.status==='approved').length,
    rejected: APP.levelSubmissions.filter(s=>s.status==='rejected').length
  };
  const queueHtml = queue.length ? queue.map(s => {
    const embed = getEmbedUrl(s.video);
    return `
    <div class="sub-item">
      <div class="sub-item-top">
        <div>
          <span class="who">${escapeHtml(s.levelName)}</span>
          <span class="what"> — by ${escapeHtml(s.creator||'Unknown')} · for ${escapeHtml(LEVEL_SUB_TARGETS[s.target]||'Demon List')}</span>
        </div>
        <span class="status-pill ${s.status}">${s.status}</span>
      </div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:2px;">Submitted by ${escapeHtml(s.submitter||'Anonymous')}</div>
      ${s.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px; font-style:italic;">"${escapeHtml(s.notes)}"</div>` : ''}
      ${s.video ? `<a class="sub-link" href="${escapeHtml(s.video)}" target="_blank">Watch level ↗</a>` : ''}
      ${embed ? ` · <a class="sub-link" href="javascript:void(0)" onclick="this.closest('.sub-item').querySelector('.sub-embed-wrap').classList.toggle('open')">▶ Preview inline</a>` : ''}
      ${embed ? `<div class="sub-embed-wrap"><div class="video-wrap"><iframe src="${embed}" allowfullscreen loading="lazy"></iframe></div></div>` : ''}
      ${isMod() && s.status==='pending' ? `
      <div class="sub-actions">
        <button class="btn small primary" onclick="approveLevelSubmission('${s.id}')">Approve &amp; Add to List</button>
        <button class="btn small danger" onclick="rejectLevelSubmission('${s.id}')">Reject</button>
      </div>` : ''}
    </div>`;
  }).join('') : `<div class="empty-state"><div class="big">No submissions${status!=='all'||q?' match':' yet'}</div>${status!=='all'||q ? 'Try clearing the filters.' : 'Levels submitted for consideration will show up here.'}</div>`;

  el.innerHTML = `
    <div class="page-head">
      <h1 class="page-title">Submit a Level</h1>
      <p class="page-desc">Think your level (or someone else's) deserves a spot on the Demon List, Challenge List, or Platformer Demon List? Send it in for review.</p>
    </div>
    <div class="list-layout" ${isMod() ? '' : 'style="grid-template-columns:1fr;"'}>
      <div class="panel">
        <div class="panel-head"><h3>New Level Submission</h3></div>
        <div style="padding:14px;">
          <div class="field"><label>Level Name</label><input id="ls-name" placeholder="e.g. Tartarus"></div>
          <div class="form-grid">
            <div class="field"><label>Creator</label><input id="ls-creator" placeholder="Level creator"></div>
            <div class="field"><label>Target List</label>
              <select id="ls-target">
                <option value="main">Demon List</option>
                <option value="challenge">Challenge List</option>
                <option value="platformer">Platformer Demon List</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Your Name</label><input id="ls-submitter" value="${APP.currentUser?escapeHtml(APP.currentUser.username):''}" placeholder="Who's submitting this?"></div>
          <div class="field"><label>Video URL <span style="color:var(--text-dim);font-weight:400;">(gameplay or showcase)</span></label><input id="ls-video" placeholder="https://youtube.com/..."></div>
          <div class="field"><label>Level ID <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="ls-levelid" placeholder="e.g. 98765432"></div>
          <div class="field"><label>Why should it be added? <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><textarea id="ls-notes" placeholder="Difficulty, standout features, anything moderators should know"></textarea></div>
          <button class="btn primary" style="width:100%;" onclick="submitLevelForm()">Send for Review</button>
          <div id="submitLevelMsg"></div>
        </div>
      </div>
      ${isMod() ? `
      <div class="panel">
        <div class="panel-head"><h3>Queue</h3></div>
        ${APP.levelSubmissions.length ? `
        <div class="status-filter-row">
          <button class="status-filter-btn ${status==='all'?'active':''}" onclick="setLevelSubStatusFilter('all')">All (${counts.all})</button>
          <button class="status-filter-btn ${status==='pending'?'active':''}" onclick="setLevelSubStatusFilter('pending')">Pending (${counts.pending})</button>
          <button class="status-filter-btn ${status==='approved'?'active':''}" onclick="setLevelSubStatusFilter('approved')">Approved (${counts.approved})</button>
          <button class="status-filter-btn ${status==='rejected'?'active':''}" onclick="setLevelSubStatusFilter('rejected')">Rejected (${counts.rejected})</button>
        </div>
        <div class="list-toolbar" style="border-bottom:none;">
          <div class="search-input-wrap">
            <span class="si-icon">⌕</span>
            <input id="lvlsub-search" placeholder="Search level, creator, submitter..." value="${escapeHtml(search)}" oninput="setLevelSubSearch(this.value)">
          </div>
        </div>` : ''}
        <div class="sub-list demon-rows" style="max-height:none;">${queueHtml}</div>
      </div>` : ''}
    </div>
  `;
  if(preserveFocus){
    const s = document.getElementById('lvlsub-search');
    if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
  }
}
async function submitLevelForm(){
  const levelName = document.getElementById('ls-name').value.trim();
  const creator = document.getElementById('ls-creator').value.trim();
  const target = document.getElementById('ls-target').value;
  const submitter = document.getElementById('ls-submitter').value.trim();
  const video = document.getElementById('ls-video').value.trim();
  const levelId = document.getElementById('ls-levelid').value.trim();
  const notes = document.getElementById('ls-notes').value.trim();
  const msgEl = document.getElementById('submitLevelMsg');
  if(!levelName || !submitter){
    msgEl.innerHTML = `<div class="msg error">Fill in at least the level name and your name.</div>`;
    return;
  }
  APP.levelSubmissions.push({
    id: uid(), levelName, creator, target, submitter, video, levelId, notes,
    status: 'pending', submittedAt: Date.now()
  });
  await saveLevelSubmissions();
  document.getElementById('ls-name').value = '';
  document.getElementById('ls-creator').value = '';
  document.getElementById('ls-video').value = '';
  document.getElementById('ls-levelid').value = '';
  document.getElementById('ls-notes').value = '';
  msgEl.innerHTML = `<div class="msg ok">Submitted! A moderator will review it soon.</div>`;
  renderAll();
}
async function approveLevelSubmission(id){
  if(!isMod()) return;
  const s = APP.levelSubmissions.find(x=>x.id===id);
  if(!s) return;
  const entry = {
    id: uid(), name: s.levelName, creator: s.creator, video: s.video, levelId: s.levelId||'',
    description: s.notes||'', tags: [], country: 'OTHER', points: 0, addedAt: Date.now()
  };
  if(s.target === 'challenge'){
    APP.challenges.push(entry);
    await saveChallenges();
  }else if(s.target === 'platformer'){
    APP.platformers.push(entry);
    await savePlatformers();
  }else{
    APP.demons.push({ ...entry, requirement: 100, likes:{}, enjoymentRatings:{}, levelChangelog:[] });
    await saveDemons();
  }
  s.status = 'approved';
  s.reviewedAt = Date.now();
  await saveLevelSubmissions();
  logChange(`"${s.levelName}" was approved and added to the ${LEVEL_SUB_TARGETS[s.target]||'Demon List'}`, true);
  renderAll();
  showToast('Submission approved and added to the list. You can now edit its details.');
}
async function rejectLevelSubmission(id){
  if(!isMod()) return;
  const s = APP.levelSubmissions.find(x=>x.id===id);
  if(!s) return;
  s.status = 'rejected';
  s.reviewedAt = Date.now();
  await saveLevelSubmissions();
  logChange(`"${s.levelName}" submission was rejected`, true);
  renderAll();
  showToast('Submission rejected', 'error');
}

/* ============================= INIT ============================= */
async function init(){     
  restoreSidebarState();
  await loadAll();
  restoreSession();
  loadRouletteLocal();

  const pathTab = pathToTab(location.pathname);
  if(pathTab) APP.activeTab = pathTab;
  applyHashRoute();
  if(!location.hash && !pathTab){
    const lastTab = recallTab();
    if(lastTab && document.getElementById('panel-'+lastTab)) APP.activeTab = lastTab;
  }
  history.replaceState({tab:APP.activeTab}, '', tabToPath(APP.activeTab) + (location.hash.startsWith('#demon-') ? location.hash : ''));
  document.querySelectorAll('nav.side-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab===APP.activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+APP.activeTab));

  renderAccountArea();
  renderAll();
  updateDocumentTitle(APP.activeTab);

  const loader = document.getElementById('initLoader');
  if(loader) loader.classList.add('hidden');
}
window.addEventListener('popstate', () => {
  const pathTab = pathToTab(location.pathname);
  applyHashRoute();
  if(pathTab) APP.activeTab = pathTab;
  renderAll();
  updateDocumentTitle(APP.activeTab);
  document.querySelectorAll('nav.side-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab===APP.activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+APP.activeTab));
});
init();
</script>
