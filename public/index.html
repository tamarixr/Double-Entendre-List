<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demon List Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-void:#05070a;
  --bg-panel:#0b0e14;
  --bg-raised:#11151f;
  --bg-raised-2:#171d2a;
  --line:#1e2536;
  --line-soft:#141924;
  --text:#f1f3f5;
  --text-muted:#949eb4;
  --text-dim:#525d73;
  --spike:#3b82f6;
  --spike-dim:#13284a;
  --spike-hover:#5091f7;
  --spike-shadow:rgba(59,130,246,0.25);
  --gold:#ffd000;
  --silver:#b0b8c6;
  --bronze:#cd7f32;
  --cyan:#22d3ee;
  --green:#4ade80;
  --red:#f87171;
  --radius:4px;
}

body.light-theme {
  --bg-void:#f3f4f6;
  --bg-panel:#ffffff;
  --bg-raised:#f9fafb;
  --bg-raised-2:#e5e7eb;
  --line:#d1d5db;
  --line-soft:#f3f4f6;
  --text:#111827;
  --text-muted:#4b5563;
  --text-dim:#9ca3af;
  --spike-dim:#dbeafe;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg-void);color:var(--text);
  font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-y:scroll;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);}

/* Top Bar Styling */
.topbar{position:sticky;top:0;z-index:100;background:rgba(5,7,10,0.95);border-bottom:1px solid var(--line);backdrop-filter:blur(8px);}
body.light-theme .topbar{background:rgba(255,255,255,0.95);}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;padding:0 20px;height:56px;gap:25px;}
.logo{font-weight:700;font-size:15px;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;text-transform:uppercase;}
.logo .mark{width:12px;height:12px;background:var(--spike);transform:rotate(45deg);}
nav.tabs{display:flex;gap:4px;height:100%;align-items:center;}
nav.tabs button{
  background:none;border:none;color:var(--text-muted);font-weight:600;font-size:13px;
  padding:8px 14px;border-radius:var(--radius);transition:all .15s ease;
}
nav.tabs button:hover{color:var(--text);background:var(--bg-raised);}
nav.tabs button.active{color:var(--text);background:var(--bg-raised-2);box-shadow:inset 0 -2px 0 var(--spike);}

.account-area-wrapper{display:flex;align-items:center;gap:12px;margin-left:auto;}
.account-chip{display:flex;align-items:center;gap:10px;font-size:12.5px;}
.role-tag{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:2px;background:var(--bg-raised-2);color:var(--text-muted);border:1px solid var(--line);}
.role-tag.admin{color:var(--spike);border-color:var(--spike-hover);background:var(--spike-dim);}

.btn{
  border:1px solid var(--line);background:var(--bg-raised);color:var(--text);
  padding:7px 14px;border-radius:var(--radius);font-size:12.5px;font-weight:600;transition:all .1s;
}
.btn:hover{border-color:var(--text-muted);background:var(--bg-raised-2);}
.btn.primary{background:var(--spike);border-color:var(--spike);color:#fff;}
.btn.primary:hover{background:var(--spike-hover);border-color:var(--spike-hover);}
.btn.danger{border-color:var(--red);color:var(--red);background:none;}
.btn.danger:hover{background:rgba(248,113,113,0.1);}
.btn.small{padding:4px 8px;font-size:11.5px;}

/* Sub-Tier Filter Segment (Pointercrate/AREDL Style) */
.tier-bar{display:flex;gap:6px;background:var(--bg-panel);padding:6px;border-radius:var(--radius);border:1px solid var(--line);margin-bottom:15px;}
.tier-bar button{
  flex:1;background:none;border:none;color:var(--text-muted);font-size:11px;font-weight:700;
  text-transform:uppercase;padding:6px;border-radius:2px;transition:all .12s;
}
.tier-bar button.active{background:var(--bg-raised-2);color:var(--text);}

/* Main Architecture Grid */
main{max-width:1400px;margin:0 auto;padding:20px;min-height:calc(100vh - 120px);}
.split-view{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;}
@media(max-width:960px){.split-view{grid-template-columns:1fr;}}

.panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-raised);border-bottom:1px solid var(--line);}
.panel-head h3{font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);font-weight:700;}

/* Demon Rows Roster list */
.demon-rows{max-height:calc(100vh - 200px);overflow-y:auto;}
.demon-row{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  border-bottom:1px solid var(--line-soft);cursor:pointer;transition:all .1s;
}
.demon-row:hover{background:var(--bg-raised);}
.demon-row.selected{background:var(--bg-raised-2);box-shadow:inset 4px 0 0 var(--spike);}
.rank-badge{
  width:32px;height:24px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;
  color:var(--text-muted);background:var(--bg-void);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;border-radius:2px;
}
.demon-row.selected .rank-badge{border-color:var(--spike);color:var(--text);}
.demon-row .info{flex:1;min-width:0;}
.demon-row .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.demon-row .author{font-size:11px;color:var(--text-muted);margin-top:2px;}
.demon-row .pts{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--gold);}

/* Deep Page Record Containers */
.detail-box{padding:20px;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:15px;border-bottom:1px solid var(--line-soft);padding-bottom:15px;}
.detail-title{font-size:24px;font-weight:700;letter-spacing:-0.02em;}
.detail-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px;}

.grid-stats{display:grid;grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg-raised);border:1px solid var(--line);padding:10px 14px;border-radius:var(--radius);}
.stat-card .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
.stat-card .lbl{font-size:10px;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-top:2px;}

.video-frame-container{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);margin-bottom:20px;}
.video-frame-container iframe{width:100%;height:100%;border:none;}

/* Records Grid Display inside levels */
.records-section-title{font-size:12px;text-transform:uppercase;font-weight:700;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.records-section-title::after{content:'';flex:1;height:1px;background:var(--line-soft);}
.records-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:10px;}
.record-card{
  background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 12px;display:flex;align-items:center;justify-content:between;gap:10px;
}
.record-card .user-info{flex:1;min-width:0;}
.record-card .user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.record-card .meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;align-items:center;gap:6px;}
.record-card .proof-link{font-size:11px;color:var(--spike);font-weight:600;}
.record-card .percent-tag{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);}

/* Leaderboards View with Sub-Country Toggling */
.lb-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;}
@media(max-width:1100px){.lb-grid{grid-template-columns:1fr;}}

.table-wrapper{overflow-x:auto;}
.list-table{width:100%;border-collapse:collapse;text-align:left;}
.list-table th{
  padding:12px 16px;font-size:11px;text-transform:uppercase;color:var(--text-muted);
  font-weight:700;background:var(--bg-raised);border-bottom:1px solid var(--line);
}
.list-table td{padding:12px 16px;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
.list-table tr:hover td{background:var(--bg-raised-2);}
.rank-col{font-family:'JetBrains Mono',monospace;font-weight:700;width:60px;}
.rank-col.gold{color:var(--gold);}
.rank-col.silver{color:var(--silver);}
.rank-col.bronze{color:var(--bronze);}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(3,4,6,0.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);}
.modal-window{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);width:100%;max-width:500px;overflow:hidden;}
.modal-window-head{padding:14px 16px;background:var(--bg-raised);border-bottom:1px solid var(--line);display:flex;justify-content:between;align-items:center;}
.modal-window-body{padding:16px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-muted);}
.field input, .field select, .field textarea{
  background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 12px;
  border-radius:var(--radius);font-size:13px;outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--spike);}

.msg{padding:10px;border-radius:var(--radius);font-size:12px;margin-bottom:12px;font-weight:500;}
.msg.err{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.msg.ok{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}

.flag{font-size:15px;vertical-align:middle;margin-right:6px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo"><span class="mark"></span>DemonList Engine</div>
    <nav class="tabs" id="globalTabs">
      <button data-tab="demons" class="active">Demons</button>
      <button data-tab="leaderboards">Leaderboard</button>
      <button data-tab="submissions">Submissions</button>
    </nav>
    <div class="account-area-wrapper">
      <button class="btn small" onclick="toggleTheme()" style="padding:4px 6px;">🌓</button>
      <div id="authDynamicZone"></div>
    </div>
  </div>
</div>

<main>
  <div class="tab-view active" id="view-demons"></div>
  <div class="tab-view" id="view-leaderboards" style="display:none;"></div>
  <div class="tab-view" id="view-submissions" style="display:none;"></div>
</main>

<div id="modalPortal"></div>

<script>
/* ============================= SYSTEM DATA ARCHITECTURE ============================= */
const DB = {
  demons: [],       // {id, name, creator, verifier, points, video, description, tier}
  players: [],      // {id, name, country}
  records: [],      // {id, demonId, playerName, country, percent, video, status}
  users: [],
  session: null,
  activeTab: 'demons',
  currentTier: 'main', // main (1-75), extended (76-150), legacy (>150)
  selectedDemonId: null,
  theme: 'dark'
};

const COUNTRIES = {
  US: "United States", GB: "United Kingdom", CA: "Canada", DE: "Germany", FR: "France",
  KR: "South Korea", JP: "Japan", BR: "Brazil", AU: "Australia", RU: "Russia"
};

function getFlag(code) {
  if (!code || code === 'OTHER') return '🏳️';
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}

/* ============================= STORAGE LAYER ============================= */
async function storageFetch(key) {
  try {
    const r = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.value;
  } catch(e) { return null; }
}
async function storageSave(key, val) {
  try {
    await fetch('/api/storage', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ key, value: val })
    });
  } catch(e) {}
}

async function loadEcosystem() {
  DB.demons = (await storageFetch('dl_demons')) || seedDemons();
  DB.players = (await storageFetch('dl_players')) || seedPlayers();
  DB.records = (await storageFetch('dl_records')) || seedRecords();
  DB.users = (await storageFetch('dl_users')) || [];
  
  try {
    const sess = localStorage.getItem('dl_session');
    if (sess) DB.session = JSON.parse(sess);
  } catch(e) {}
  
  assignTiers();
}

function assignTiers() {
  // Sort naturally by internal hierarchy position or placement points to match Pointercrate standard
  DB.demons.sort((a,b) => b.points - a.points);
  DB.demons.forEach((d, idx) => {
    const pos = idx + 1;
    if (pos <= 75) d.tier = 'main';
    else if (pos <= 150) d.tier = 'extended';
    else d.tier = 'legacy';
  });
}

async function syncDemons() { assignTiers(); await storageSave('dl_demons', DB.demons); }
async function syncPlayers() { await storageSave('dl_players', DB.players); }
async function syncRecords() { await storageSave('dl_records', DB.records); }
async function syncUsers() { await storageSave('dl_users', DB.users); }

/* ============================= SEED GENERATION DATA ============================= */
function seedDemons() {
  return [
    { id: 'd1', name: 'Society', creator: 'neomarbilan', verifier: 'neomarbilan', points: 250, video: 'https://www.youtube.com/embed/dQw4w9WgXcQ', description: 'Currently top tier threat.' },
    { id: 'd2', name: 'Silent Clubstep', creator: 'Sailent', verifier: 'Paqell', points: 240, video: '', description: 'Historical legacy monster.' },
    { id: 'd3', name: 'Avernus', creator: 'PockeWindfish', verifier: 'Diamond', points: 235, video: '', description: 'Extreme precision hazards.' },
    { id: 'd4', name: 'Zodiac', creator: 'Bianox', verifier: 'Xanii', points: 120, video: '', description: 'Classic legendary marathon endurance level.' }
  ];
}
function seedPlayers() {
  return [
    { id: 'p1', name: 'Zoink', country: 'US' },
    { id: 'p2', name: 'Trick', country: 'US' },
    { id: 'p3', name: 'Wpopoff', country: 'KR' }
  ];
}
function seedRecords() {
  return [
    { id: 'r1', demonId: 'd1', playerName: 'Zoink', country: 'US', percent: 100, video: 'https://youtube.com', status: 'approved' },
    { id: 'r2', demonId: 'd2', playerName: 'Trick', country: 'US', percent: 100, video: 'https://youtube.com', status: 'approved' },
    { id: 'r3', demonId: 'd1', playerName: 'Wpopoff', country: 'KR', percent: 84, video: 'https://youtube.com', status: 'approved' }
  ];
}

/* ============================= CALCULATING STATS DYNAMICALLY ============================= */
function calculatePlayerPoints() {
  const scoreMap = {};
  DB.players.forEach(p => { scoreMap[p.name.toLowerCase()] = { playerObj: p, pt: 0 }; });
  
  DB.records.forEach(rec => {
    if (rec.status !== 'approved') return;
    const d = DB.demons.find(dm => dm.id === rec.demonId);
    if (!d) return;
    
    const pKey = rec.playerName.toLowerCase();
    if (!scoreMap[pKey]) {
      // Auto register unknown players coming from records
      scoreMap[pKey] = { playerObj: { id: 'p_' + Math.random(), name: rec.playerName, country: rec.country || 'US' }, pt: 0 };
    }
    
    // Points formula weighting matching percent score rules
    if (parseInt(rec.percent) === 100) {
      scoreMap[pKey].pt += d.points;
    } else if (d.tier === 'main') { 
      // Main list partial progress reward rule inspired by Pointercrate/Global list
      const partialWeight = d.points * (rec.percent / 100) * 0.4;
      scoreMap[pKey].pt += Math.round(partialWeight * 10) / 10;
    }
  });
  
  return Object.values(scoreMap).map(item => ({
    ...item.playerObj,
    totalPoints: Math.round(item.pt * 10) / 10
  })).sort((a,b) => b.totalPoints - a.totalPoints);
}

function calculateCountryPoints(playerRankings) {
  const countryMap = {};
  playerRankings.forEach(p => {
    const c = p.country || 'OTHER';
    if (!countryMap[c]) countryMap[c] = 0;
    countryMap[c] += p.totalPoints;
  });
  return Object.entries(countryMap).map(([code, pts]) => ({
    code,
    name: COUNTRIES[code] || 'Other/Unspecified',
    points: Math.round(pts * 10) / 10
  })).sort((a,b) => b.points - a.points);
}

/* ============================= AUTH MIDDLEWARE ============================= */
function isStaff() { return DB.session !== null && DB.session.role === 'admin'; }

function renderAuthZone() {
  const zone = document.getElementById('authDynamicZone');
  if (DB.session) {
    zone.innerHTML = `
      <div class="account-chip">
        <span class="role-tag ${DB.session.role === 'admin' ? 'admin' : ''}">${DB.session.role}</span>
        <strong>${escapeHtml(DB.session.name)}</strong>
        <button class="btn small" onclick="triggerLogout()">Logout</button>
      </div>`;
  } else {
    zone.innerHTML = `<button class="btn primary small" onclick="openLoginWindow()">Staff Access</button>`;
  }
}

function openLoginWindow() {
  openPortal(`
    <div class="modal-overlay" onclick="if(event.target===this) closePortal()">
      <div class="modal-window">
        <div class="modal-window-head"><strong>Staff Authentication</strong></div>
        <div class="modal-window-body">
          <div id="modalAuthAlert"></div>
          <div class="field"><label>Username Key</label><input type="text" id="auth_user"></div>
          <div class="field"><label>Password Signature</label><input type="password" id="auth_pass"></div>
          <button class="btn primary" style="width:100%; margin-top:10px;" onclick="executeLogin()">Verify Signatures</button>
        </div>
      </div>
    </div>
  `);
}

function executeLogin() {
  const u = document.getElementById('auth_user').value.trim();
  const p = document.getElementById('auth_pass').value;
  const alertBox = document.getElementById('modalAuthAlert');

  // Mirror direct auth structure matching your underlying system configuration keys
  const lookup = u.toLowerCase();
  if (lookup === 'tamari' || lookup === 'hakku') {
    const b64 = btoa(p.split('').reverse().join(''));
    const valid = (lookup === 'tamari' && b64 === 'NjU0OTg3bmF3ZQ==') || (lookup === 'hakku' && b64 === 'NjU0OTg3dWttYWg=');
    if (valid) {
      DB.session = { name: lookup, role: 'admin' };
      localStorage.setItem('dl_session', JSON.stringify(DB.session));
      closePortal();
      renderAuthZone();
      renderGlobalViews();
      return;
    }
  }
  alertBox.innerHTML = `<div class="msg err">Invalid authentication key parameters.</div>`;
}

function triggerLogout() {
  DB.session = null;
  localStorage.removeItem('dl_session');
  renderAuthZone();
  renderGlobalViews();
}

/* ============================= CORE NAVIGATION ROUTERS ============================= */
document.getElementById('globalTabs').addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  DB.activeTab = btn.dataset.tab;
  document.querySelectorAll('#globalTabs button').forEach(b => b.classList.toggle('active', b === btn));
  renderGlobalViews();
});

function renderGlobalViews() {
  document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
  const target = document.getElementById(`view-${DB.activeTab}`);
  target.style.display = 'block';

  if (DB.activeTab === 'demons') renderDemonsView(target);
  if (DB.activeTab === 'leaderboards') renderLeaderboardsView(target);
  if (DB.activeTab === 'submissions') renderSubmissionsView(target);
}

/* ============================= VIEW: DEMONS PANEL ============================= */
function renderDemonsView(container) {
  const filteredDemons = DB.demons.filter(d => d.tier === DB.currentTier);
  if (!DB.selectedDemonId && filteredDemons.length) DB.selectedDemonId = filteredDemons[0].id;
  const currentDemon = DB.demons.find(d => d.id === DB.selectedDemonId);

  let listRosterHtml = filteredDemons.map(d => {
    const globalIndex = DB.demons.findIndex(x => x.id === d.id) + 1;
    return `
      <div class="demon-row ${d.id === DB.selectedDemonId ? 'selected' : ''}" onclick="selectDemon('${d.id}')">
        <div class="rank-badge">${globalIndex}</div>
        <div class="info">
          <div class="name">${escapeHtml(d.name)}</div>
          <div class="author">by ${escapeHtml(d.creator)}</div>
        </div>
        <div class="pts">${d.points}★</div>
      </div>`;
  }).join('');

  if (!listRosterHtml) {
    listRosterHtml = `<div style="padding:4px;color:var(--text-dim);font-size:12px;">No levels populated in this tier index list.</div>`;
  }

  let detailAreaHtml = `<div style="color:var(--text-muted);font-size:13px;">Select a demon framework row file to observe complete ledger completions.</div>`;
  
  if (currentDemon) {
    const globalPos = DB.demons.findIndex(x => x.id === currentDemon.id) + 1;
    const associatedCompletions = DB.records.filter(r => r.demonId === currentDemon.id && r.status === 'approved');
    
    let embedFrame = `<div class="video-frame-container"><div style="padding:20px;color:var(--text-dim);font-size:13px;text-align:center;">No valid demonstration display asset configured.</div></div>`;
    if (currentDemon.video) {
      embedFrame = `<div class="video-frame-container"><iframe src="${escapeHtml(currentDemon.video)}" allowfullscreen></iframe></div>`;
    }

    let recordsGridHtml = associatedCompletions.map(r => `
      <div class="record-card">
        <div class="user-info">
          <div class="user-name">${escapeHtml(r.playerName)}</div>
          <div class="meta">
            <span>${getFlag(r.country)} ${r.country || 'US'}</span>
            <a class="proof-link" href="${escapeHtml(r.video)}" target="_blank">Proof URL ↗</a>
          </div>
        </div>
        <div class="percent-tag">${r.percent}%</div>
      </div>
    `).join('');

    if(!recordsGridHtml) {
      recordsGridHtml = `<div style="grid-column:1/-1; padding:20px; text-align:center; color:var(--text-dim); font-size:12.5px; background:var(--bg-raised); border:1px dashed var(--line); border-radius:var(--radius);">No verified completion entries registered to this dynamic level layout.</div>`;
    }

    detailAreaHtml = `
      <div class="detail-box">
        <div class="detail-header">
          <div>
            <div class="detail-title">${escapeHtml(currentDemon.name)}</div>
            <div class="detail-subtitle">Created by <strong>${escapeHtml(currentDemon.creator)}</strong> · Verified by <strong>${escapeHtml(currentDemon.verifier || currentDemon.creator)}</strong></div>
          </div>
          ${isStaff() ? `
            <div>
              <button class="btn small primary" onclick="openDemonManagementWizard('${currentDemon.id}')">Modify level details</button>
            </div>
          ` : ''}
        </div>

        <div class="grid-stats">
          <div class="stat-card"><div class="val">#${globalPos}</div><div class="lbl">List Rank</div></div>
          <div class="stat-card"><div class="val">${currentDemon.points}</div><div class="lbl">Point Weight</div></div>
          <div class="stat-card"><div class="val">${associatedCompletions.length}</div><div class="lbl">Total Records</div></div>
        </div>

        ${embedFrame}

        <div class="records-section-title">Verified Records & Progress Matrix</div>
        <div class="records-grid">${recordsGridHtml}</div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="tier-bar" id="tierSelector">
      <button class="${DB.currentTier === 'main' ? 'active' : ''}" data-tier="main">Main List (Top 75)</button>
      <button class="${DB.currentTier === 'extended' ? 'active' : ''}" data-tier="extended">Extended List (Top 150)</button>
      <button class="${DB.currentTier === 'legacy' ? 'active' : ''}" data-tier="legacy">Legacy Archive</button>
    </div>
    <div class="split-view">
      <div class="panel">
        <div class="panel-head">
          <h3>Tier Index Layout</h3>
          ${isStaff() ? `<button class="btn small primary" onclick="openDemonManagementWizard()">+ Append Level</button>` : ''}
        </div>
        <div class="demon-rows">${listRosterHtml}</div>
      </div>
      <div class="panel">${detailAreaHtml}</div>
    </div>
  `;

  document.getElementById('tierSelector').addEventListener('click', e => {
    const b = e.target.closest('button[data-tier]');
    if (!b) return;
    DB.currentTier = b.dataset.tier;
    DB.selectedDemonId = null;
    renderDemonsView(container);
  });
}

function selectDemon(id) { DB.selectedDemonId = id; renderGlobalViews(); }

function openDemonManagementWizard(id = null) {
  const d = DB.demons.find(x => x.id === id);
  openPortal(`
    <div class="modal-overlay" onclick="if(event.target===this) closePortal()">
      <div class="modal-window">
        <div class="modal-window-head"><strong>${d ? 'Modify Demon Config' : 'Initialize Level Entry'}</strong></div>
        <div class="modal-window-body">
          <div class="field"><label>Level Name</label><input type="text" id="fm_d_name" value="${d ? escapeHtml(d.name) : ''}"></div>
          <div class="field"><label>Creator Author</label><input type="text" id="fm_d_creator" value="${d ? escapeHtml(d.creator) : ''}"></div>
          <div class="field"><label>Verifier</label><input type="text" id="fm_d_verifier" value="${d ? escapeHtml(d.verifier) : ''}"></div>
          <div class="field"><label>Base point distribution score</label><input type="number" id="fm_d_pts" value="${d ? d.points : 100}"></div>
          <div class="field"><label>Direct Embed URL</label><input type="text" id="fm_d_vid" value="${d ? escapeHtml(d.video) : ''}"></div>
          <div style="display:flex;gap:10px;margin-top:15px;">
            <button class="btn" style="flex:1;" onclick="closePortal()">Abort</button>
            <button class="btn primary" style="flex:1;" onclick="saveDemonForm('${id || ''}')">Commit Array</button>
          </div>
        </div>
      </div>
    </div>
  `);
}

async function saveDemonForm(id) {
  const payload = {
    name: document.getElementById('fm_d_name').value.trim(),
    creator: document.getElementById('fm_d_creator').value.trim(),
    verifier: document.getElementById('fm_d_verifier').value.trim(),
    points: parseInt(document.getElementById('fm_d_pts').value) || 0,
    video: document.getElementById('fm_d_vid').value.trim()
  };

  if (!payload.name) return;

  if (id) {
    const idx = DB.demons.findIndex(x => x.id === id);
    DB.demons[idx] = { ...DB.demons[idx], ...payload };
  } else {
    DB.demons.push({ id: 'dem_' + Date.now(), ...payload });
  }

  await syncDemons();
  closePortal();
  renderGlobalViews();
}

/* ============================= VIEW: LEADERBOARDS ============================= */
function renderLeaderboardsView(container) {
  const playerRankings = calculatePlayerPoints();
  const countryRankings = calculateCountryPoints(playerRankings);

  const playerRows = playerRankings.map((p, index) => `
    <tr>
      <td class="rank-col ${index===0?'gold':index===1?'silver':index===2?'bronze':''}">${index+1}</td>
      <td><strong>${escapeHtml(p.name)}</strong></td>
      <td>${getFlag(p.country)} ${p.country || 'US'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);">${p.totalPoints}pt</td>
    </tr>
  `).join('');

  const countryRows = countryRankings.map((c, index) => `
    <tr>
      <td class="rank-col ${index===0?'gold':index===1?'silver':index===2?'bronze':''}">${index+1}</td>
      <td>${getFlag(c.code)} <strong>${escapeHtml(c.name)}</strong></td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--cyan);">${c.points}pt</td>
    </tr>
  `).join('');

  let staffAwardPanel = '';
  if (isStaff()) {
    const pOptions = playerRankings.map(p => `<option value="${escapeHtml(p.name)}">${escapeHtml(p.name)}</option>`).join('');
    const dOptions = DB.demons.map(d => `<option value="${d.id}">${escapeHtml(d.name)} (${d.points}pt)</option>`).join('');
    staffAwardPanel = `
      <div class="panel" style="margin-top:20px; border-color: var(--spike);">
        <div class="panel-head" style="background:var(--spike-dim);"><h3 style="color:var(--text);">⚡ Direct Staff Level Insertion</h3></div>
        <div style="padding:15px;">
          <div id="quickAwardToast"></div>
          <div class="field"><label>Target Player Profile</label><select id="qa_player">${pOptions}</select></div>
          <div class="field"><label>Demon Reference</label><select id="qa_demon">${dOptions}</select></div>
          <div class="field"><label>Percent Realized</label><input type="number" id="qa_pct" value="100" min="1" max="100"></div>
          <div class="field"><label>Evidence Link</label><input type="text" id="qa_link" value="https://youtube.com"></div>
          <button class="btn primary small" style="width:100%;margin-top:5px;" onclick="executeQuickStaffInsertion()">Force Inject Record</button>
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="lb-grid">
      <div class="panel">
        <div class="panel-head"><h3>Individual Ledger Standings (Pointercrate / AREDL Framework)</h3></div>
        <div class="table-wrapper">
          <table class="list-table">
            <thead><tr><th>Rank</th><th>Player Name</th><th>Region</th><th>Score Total</th></tr></thead>
            <tbody>${playerRows}</tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="panel">
          <div class="panel-head"><h3>Regional Macro Standings</h3></div>
          <div class="table-wrapper">
            <table class="list-table">
              <thead><tr><th>Rank</th><th>Country Group</th><th>Combined Point Value</th></tr></thead>
              <tbody>${countryRows}</tbody>
            </table>
          </div>
        </div>
        ${staffAwardPanel}
      </div>
    </div>
  `;
}

async function executeQuickStaffInsertion() {
  const name = document.getElementById('qa_player').value;
  const dId = document.getElementById('qa_demon').value;
  const pct = parseInt(document.getElementById('qa_pct').value) || 100;
  const vid = document.getElementById('qa_link').value;

  if(!name || !dId) return;

  DB.records.push({
    id: 'rec_' + Date.now(),
    demonId: dId,
    playerName: name,
    country: 'US',
    percent: pct,
    video: vid,
    status: 'approved'
  });

  await syncRecords();
  document.getElementById('quickAwardToast').innerHTML = `<div class="msg ok">Record forced into production baseline cleanly.</div>`;
  setTimeout(renderGlobalViews, 800);
}

/* ============================= VIEW: SUBMISSIONS ============================= */
function renderSubmissionsView(container) {
  const dOptions = DB.demons.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
  const activeQueue = DB.records.filter(r => isStaff() ? true : r.status === 'pending');

  const queueRows = activeQueue.map(r => {
    const d = DB.demons.find(dm => dm.id === r.demonId);
    return `
      <tr>
        <td><strong>${escapeHtml(r.playerName)}</strong></td>
        <td>${d ? escapeHtml(d.name) : 'Unknown'}</td>
        <td><span class="percent-tag" style="font-weight:700;">${r.percent}%</span></td>
        <td><a href="${escapeHtml(r.video)}" target="_blank" style="color:var(--spike);">Review Video ↗</a></td>
        <td><span class="role-tag" style="color: ${r.status==='approved'?'var(--green)':'var(--text-muted)'}">${r.status}</span></td>
        ${isStaff() && r.status === 'pending' ? `
          <td>
            <button class="btn small primary" onclick="resolveSubmission('${r.id}', 'approved')">Accept</button>
            <button class="btn small danger" onclick="resolveSubmission('${r.id}', 'rejected')">Deny</button>
          </td>
        ` : '<td>-</td>'}
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div class="split-view" style="grid-template-columns: 1fr 2fr;">
      <div class="panel">
        <div class="panel-head"><h3>File Verification Submissions Pipeline</h3></div>
        <div style="padding:15px;">
          <div id="subToast"></div>
          <div class="field"><label>Competitor Profile Handle</label><input type="text" id="sub_name"></div>
          <div class="field"><label>Demon Index Target</label><select id="sub_demon">${dOptions}</select></div>
          <div class="field"><label>Percent Realized Progression</label><input type="number" id="sub_pct" value="100"></div>
          <div class="field"><label>Video URL Proof Archive</label><input type="text" id="sub_vid" placeholder="https://youtube.com/..."></div>
          <button class="btn primary" style="width:100%;margin-top:10px;" onclick="dispatchUserSubmission()">Transmit Record Package</button>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-head"><h3>Real-time Ledger Ingestion Pipeline</h3></div>
        <div class="table-wrapper">
          <table class="list-table">
            <thead><tr><th>Competitor</th><th>Level Target</th><th>Record Pct</th><th>Data URL</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${queueRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

async function dispatchUserSubmission() {
  const name = document.getElementById('sub_name').value.trim();
  const dId = document.getElementById('sub_demon').value;
  const pct = parseInt(document.getElementById('sub_pct').value) || 0;
  const vid = document.getElementById('sub_vid').value.trim();

  if(!name || !vid) {
    document.getElementById('subToast').innerHTML = `<div class="msg err">All record properties must be set explicitly.</div>`;
    return;
  }

  DB.records.push({
    id: 'rec_' + Date.now(),
    demonId: dId,
    playerName: name,
    country: 'US',
    percent: pct,
    video: vid,
    status: 'pending'
  });

  await syncRecords();
  document.getElementById('subToast').innerHTML = `<div class="msg ok">Record package logged to ledger queue.</div>`;
  renderGlobalViews();
}

async function resolveSubmission(id, status) {
  const r = DB.records.find(x => x.id === id);
  if(!r) return;
  r.status = status;
  
  // Verify if player configuration is initialized, otherwise materialize profile space
  const nameMatch = r.playerName.toLowerCase();
  if (status === 'approved' && !DB.players.some(p => p.name.toLowerCase() === nameMatch)) {
    DB.players.push({
      id: 'pl_' + Date.now(),
      name: r.playerName,
      country: r.country || 'US'
    });
    await syncPlayers();
  }

  await syncRecords();
  renderGlobalViews();
}

/* ============================= SYSTEM UI INTERNALS ============================= */
function openPortal(html) { document.getElementById('modalPortal').innerHTML = html; }
function closePortal() { document.getElementById('modalPortal').innerHTML = ''; }
function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toggleTheme() {
  DB.theme = DB.theme === 'dark' ? 'light' : 'dark';
  if(DB.theme === 'light') document.body.classList.add('light-theme');
  else document.body.classList.remove('light-theme');
}

async function entrypoint() {
  await loadEcosystem();
  renderAuthZone();
  renderGlobalViews();
}
entrypoint();
</script>
</body>
</html>
