<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Entendre Demon List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-void:#08090c;
  --bg-panel:#11131a;
  --bg-raised:#171a24;
  --bg-raised-2:#1f2330;
  --line:#242836;
  --line-soft:#1a1d28;
  --text:#e4e6eb;
  --text-muted:#82879c;
  --text-dim:#4e5266;
  --spike:#ff3b6b;
  --spike-dim:#7a2138;
  --spike-hover:#ff5580;
  --spike-shadow:rgba(255,59,107,0.4);
  --gold:#ffb845;
  --cyan:#4fd8ff;
  --green:#4ade80;
  --red:#ff5470;
  --radius:3px;
}

body.light-theme {
  --bg-void:#f3f4f6;
  --bg-panel:#ffffff;
  --bg-raised:#f9fafb;
  --bg-raised-2:#f3f4f6;
  --line:#e5e7eb;
  --line-soft:#f3f4f6;
  --text:#111827;
  --text-muted:#4b5563;
  --text-dim:#9ca3af;
  --spike-dim:#fce7f3;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg-void);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--spike);color:#fff;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

h1,h2,h3,.display{font-family:'Inter',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ---------- sidebar nav ---------- */
:root{ --sidebar-w:220px; }
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:40;
  background:rgba(8,9,12,0.98);border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  transition:transform .32s cubic-bezier(.65,0,.35,1), box-shadow .32s ease;
  overflow-y:auto;
}
body.light-theme .sidebar{ background:rgba(255,255,255,0.98); }
.sidebar.collapsed{ transform:translateX(calc(-1 * var(--sidebar-w))); box-shadow:none; }
body.sidebar-collapsed main{ margin-left:0; }
body.sidebar-collapsed .sidebar-toggle{ opacity:1;visibility:visible;transform:translateX(0); }
main{ margin-left:var(--sidebar-w); transition:margin-left .32s cubic-bezier(.65,0,.35,1); }

.sidebar-head{ padding:16px 16px 10px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.sidebar .logo{
  font-family:'Inter',sans-serif;font-weight:700;font-size:15px;letter-spacing:-0.01em;
  display:flex;align-items:center;gap:8px;color:var(--text);white-space:nowrap;
}
.sidebar .logo .mark{ width:13px;height:13px;background:var(--spike);display:inline-block;flex:none; }
.sidebar-collapse-btn{
  background:none;border:1px solid var(--line);color:var(--text-dim);border-radius:var(--radius);
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;
  transition:all .15s ease;
}
.sidebar-collapse-btn:hover{ color:var(--text);border-color:var(--text-dim); }

nav.side-tabs{ display:flex;flex-direction:column;gap:1px;padding:6px 10px;flex:1; }
.side-nav-label{
  font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);
  font-weight:700;padding:12px 8px 4px;
}
nav.side-tabs button{
  display:flex;align-items:center;gap:9px;text-align:left;
  background:none;border:none;color:var(--text-muted);
  font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
  padding:8px 10px;border-radius:var(--radius);transition:all .12s ease;position:relative;
}
nav.side-tabs button .si{ font-size:13px;flex:none;width:16px;text-align:center; }
nav.side-tabs button:hover{ color:var(--text);background:var(--bg-raised); }
nav.side-tabs button.active{ color:var(--text);background:var(--bg-raised-2); }
nav.side-tabs button.active::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;width:2.5px;background:var(--spike);border-radius:2px;
}

.sidebar-foot{ padding:10px 14px 16px;border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:8px; }
.account-area-wrapper{ display:flex;flex-direction:column;align-items:stretch;gap:8px; }
.account-chip{ display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--text-muted); }
.account-chip .name{ color:var(--text);font-weight:600; }
.sidebar-quickrow{ display:flex;gap:6px;flex-wrap:wrap; }
.role-tag{
  font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  padding:1px 5px;border-radius:2px;background:var(--bg-raised-2);color:var(--text-muted);
  border:1px solid var(--line);
}
.role-tag.admin{color:var(--spike);border-color:var(--spike-dim);background:var(--spike-dim);}
body.light-theme .role-tag.admin { background: var(--spike-dim); color: var(--spike); }

.sidebar-toggle{
  position:fixed;top:14px;right:16px;z-index:60;
  width:34px;height:34px;border-radius:8px;
  background:var(--bg-raised-2);border:1px solid var(--line);color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  opacity:0;visibility:hidden;transform:translateX(6px);
  transition:opacity .2s ease, transform .2s ease, visibility .2s ease, background .15s ease, color .15s ease;
  box-shadow:0 4px 14px rgba(0,0,0,0.3);
}
.sidebar-toggle:hover{ color:var(--text);border-color:var(--spike); }

@media(max-width:880px){
  :root{ --sidebar-w:230px; }
  .sidebar{ transform:translateX(calc(-1 * var(--sidebar-w))); box-shadow:0 0 30px rgba(0,0,0,0.5); }
  .sidebar:not(.collapsed){ transform:translateX(0); }
  main{ margin-left:0 !important; }
  .sidebar-toggle{ opacity:1;visibility:visible;transform:translateX(0); }
  body:not(.sidebar-collapsed) .sidebar-toggle{ right:calc(var(--sidebar-w) + 12px); }
}

.btn{
  border:1px solid var(--line);background:var(--bg-raised);color:var(--text);
  padding:6px 12px;border-radius:var(--radius);font-size:12.5px;font-weight:600;
  transition:all .1s;
}
.btn:hover{border-color:var(--text-dim);background:var(--bg-raised-2);}
.btn.primary{background:var(--spike);border-color:var(--spike);color:#fff;}
.btn.primary:hover{background:var(--spike-hover);}
.btn.ghost{background:none;}
.btn.small{padding:4px 8px;font-size:11.5px;}
.btn.danger{border-color:var(--red);color:var(--red);background:none;}
.btn.danger:hover{background:rgba(255,84,112,0.08);}
.btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ---------- layout ---------- */
main{max-width:1200px;padding:20px 15px 60px;}
.page-head{margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:15px;}
.page-title{font-size:26px;font-weight:700;margin-bottom:4px;}
.page-desc{color:var(--text-muted);font-size:13px;max-width:720px;line-height:1.4;}

.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ---------- list layout ---------- */
.list-layout{display:grid;grid-template-columns:360px 1fr;gap:15px;align-items:start;}
@media(max-width:820px){.list-layout{grid-template-columns:1fr;}}

.panel{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg-raised);border-bottom:1px solid var(--line);
}
.panel-head h3{font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);}

.demon-rows{max-height:75vh;overflow-y:auto;}
.demon-row{
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .1s;
}
.demon-row:last-child{border-bottom:none;}
.demon-row:hover{background:var(--bg-raised);}
.demon-row.selected{background:var(--bg-raised-2);border-left:3px solid var(--spike);padding-left:9px;}

.rank-badge{
  width:26px;height:22px;flex:none;
  background:var(--bg-raised-2);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--text-muted);
  border-radius:2px;
}
.rank-badge.top{background:var(--spike-dim);color:var(--text);border-color:var(--spike);}
body.light-theme .rank-badge.top { color: var(--spike); }

.demon-row .info{flex:1;min-width:0;}
.demon-row .name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.demon-row .creator{font-size:11px;color:var(--text-dim);margin-top:1px;}
.demon-row .pts{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);flex:none;}

.tag-container {
  display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;
}
.tag-pill {
  font-size:9px;font-weight:600;padding:1px 5px;background:var(--bg-void);
  border:1px solid var(--line);color:var(--text-muted);text-transform:uppercase;border-radius:2px;
}

.reorder{display:flex;flex-direction:column;gap:1px;flex:none;}
.reorder button{
  width:16px;height:12px;background:var(--bg-raised);border:1px solid var(--line);
  color:var(--text-dim);font-size:8px;border-radius:1px;display:flex;align-items:center;justify-content:center;
}
.reorder button:hover{color:var(--text);border-color:var(--text-dim);}

.empty-state{padding:30px 15px;text-align:center;color:var(--text-dim);font-size:12.5px;}
.empty-state .big{font-family:'Inter',sans-serif;font-size:14px;color:var(--text-muted);margin-bottom:4px;font-weight:600;}

/* detail panel */
.detail{padding:16px;}
.detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.detail-title{font-size:20px;font-weight:700;font-family:'Inter',sans-serif;}
.detail-sub{color:var(--text-muted);font-size:13px;margin-top:2px;}
.stat-row{display:flex;gap:16px;margin:12px 0;flex-wrap:wrap;}
.stat{background:var(--bg-raised);border:1px solid var(--line);padding:6px 12px;border-radius:var(--radius);min-width:80px;}
.stat .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--gold);}
.stat.rankstat .val{color:var(--spike);}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);margin-top:1px;}
.video-wrap{
  position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);
  overflow:hidden;border:1px solid var(--line);margin-top:10px;
}
.video-wrap iframe{width:100%;height:100%;border:none;}
.video-wrap .noVideo{
  height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12.5px;
}
.detail-desc{margin-top:12px;color:var(--text-muted);font-size:13px;line-height:1.5;padding:10px;background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);}
.detail-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:2px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px 16px;}
.detail-meta span b{color:var(--text-muted);font-weight:600;}
.detail-actions{display:flex;gap:6px;margin-top:14px;}
.detail-banner{width:100%;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:var(--bg-raised-2);margin-bottom:12px;position:relative;}
.detail-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.video-tabs{display:flex;gap:6px;margin-top:12px;margin-bottom:-4px;}
.video-tabs button{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--line);border-bottom:none;background:var(--bg-raised);color:var(--text-dim);cursor:pointer;}
.video-tabs button.active{color:var(--text);background:var(--bg-raised-2);}

/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid.full{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-dim);font-weight:600;}
.field input,.field select,.field textarea{
  background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
  padding:7px 10px;border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .1s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--spike);}
.field textarea{resize:vertical;min-height:60px;}
.field .hint{font-size:10.5px;color:var(--text-dim);line-height:1.3;}
.modal-backdrop{
  position:fixed;inset:0;background:rgba(4,5,7,0.8);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:15px;
}
.modal{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);
  width:100%;max-width:460px;max-height:90vh;overflow-y:auto;
}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg-raised);}
.modal-head h3{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:18px;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:6px;background:var(--bg-raised);}
.msg{font-size:12px;padding:8px 10px;border-radius:var(--radius);margin-bottom:10px;}
.msg.error{background:rgba(255,84,112,0.08);color:var(--red);border:1px solid rgba(255,84,112,0.2);}
.msg.ok{background:rgba(74,222,128,0.08);color:var(--green);border:1px solid rgba(74,222,128,0.2);}

/* leaderboard */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);
  padding:8px 12px;border-bottom:1px solid var(--line);font-weight:600;background:var(--bg-raised);
}
.lb-table td{padding:8px 12px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:middle;}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tr:hover td{background:var(--bg-raised);}
.flag{font-size:16px;margin-right:6px;}
.lb-rank{font-family:'JetBrains Mono',monospace;color:var(--text-dim);width:36px;}
.lb-rank.r1{color:var(--gold);font-weight:700;}
.lb-rank.r2{color:#c9cbe0;font-weight:700;}
body.light-theme .lb-rank.r2 { color: #6b7280; }
.lb-rank.r3{color:#d8935a;font-weight:700;}
.lb-points{font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:600;}
.lb-actions{display:flex;gap:4px;}

/* roulette */
.roulette-wrap{display:flex;flex-direction:column;align-items:center;gap:15px;padding:5px 0 20px;}
.roulette-card{
  width:100%;max-width:440px;background:var(--bg-panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;text-align:center;position:relative;
}
.roulette-req{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;}
.roulette-demon{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px;}
.roulette-creator{color:var(--text-muted);font-size:12.5px;margin-bottom:15px;}
.roulette-target{font-size:40px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--spike);margin-bottom:15px;}
.roulette-input-row{display:flex;gap:6px;justify-content:center;margin-bottom:10px;}
.roulette-input-row input{
  width:90px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:15px;
  background:var(--bg-raised);border:1px solid var(--line);color:var(--text);border-radius:var(--radius);padding:6px;
}
.roulette-input-row input:focus{outline:none;border-color:var(--spike);}
.roulette-feedback{font-size:12.5px;min-height:18px;margin-bottom:4px;font-weight:600;}
.roulette-feedback.pass{color:var(--green);}
.roulette-feedback.fail{color:var(--red);}
.roulette-history{width:100%;max-width:440px;}
.rh-item{
  display:flex;align-items:center;justify-content:space-between;padding:7px 12px;
  border-bottom:1px solid var(--line-soft);font-size:12px;
}
.rh-item .rh-name{color:var(--text-muted);}
.rh-item .rh-result{font-family:'JetBrains Mono',monospace;font-weight:600;}
.rh-item .rh-result.pass{color:var(--green);}
.rh-item .rh-result.fail{color:var(--red);}

/* submissions */
.sub-item{padding:10px 12px;border-bottom:1px solid var(--line-soft);}
.sub-item:last-child{border-bottom:none;}
.sub-item-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;}
.sub-item .who{font-weight:600;font-size:13px;}
.sub-item .what{color:var(--text-muted);font-size:12px;}
.status-pill{font-size:9px;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-weight:700;}
.status-pill.pending{background:rgba(255,184,69,0.08);color:var(--gold);border:1px solid rgba(255,184,69,0.2);}
.status-pill.approved{background:rgba(74,222,128,0.08);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.status-pill.rejected{background:rgba(255,84,112,0.08);color:var(--red);border:1px solid rgba(255,84,112,0.2);}
.sub-actions{display:flex;gap:4px;margin-top:6px;}
.sub-link{font-size:11.5px;color:var(--cyan);display:inline-block;margin-top:2px;}

.footer-note{max-width:1200px;margin-left:var(--sidebar-w);padding:20px 15px;color:var(--text-dim);font-size:11px;text-align:center;border-top:1px solid var(--line-soft);transition:margin-left .32s cubic-bezier(.65,0,.35,1);}
body.sidebar-collapsed .footer-note{margin-left:0;}
@media(max-width:880px){.footer-note{margin-left:0 !important;}}

/* ---------- QOL: stat cards ---------- */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.stat-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;}
.stat-card .sc-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--spike);}
.stat-card .sc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);margin-top:2px;}

/* ---------- QOL: toolbar (search/sort/filter) ---------- */
.list-toolbar{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;background:var(--bg-raised);}
.list-toolbar-row{display:flex;gap:6px;}
.search-input-wrap{position:relative;flex:1;}
.search-input-wrap input{width:100%;padding:6px 10px 6px 26px;background:var(--bg-void);border:1px solid var(--line);color:var(--text);border-radius:var(--radius);font-size:12.5px;outline:none;}
.search-input-wrap input:focus{border-color:var(--spike);}
.search-input-wrap .si-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:11px;pointer-events:none;}
.sort-select{background:var(--bg-void);border:1px solid var(--line);color:var(--text);border-radius:var(--radius);font-size:12px;padding:6px 8px;outline:none;}
.tag-filter-row{display:flex;flex-wrap:wrap;gap:4px;}
.tag-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;border:1px solid var(--line);background:var(--bg-void);color:var(--text-muted);text-transform:uppercase;transition:all .1s;}
.tag-chip:hover{border-color:var(--text-dim);color:var(--text);}
.tag-chip.active{background:var(--spike-dim);border-color:var(--spike);color:var(--text);}
.result-count{font-size:11px;color:var(--text-dim);padding:6px 12px 0;}
.kbd-hint{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg-void);border:1px solid var(--line);border-radius:2px;padding:0 4px;color:var(--text-dim);}

/* ---------- QOL: copy link / small icon buttons ---------- */
.icon-btn{background:none;border:1px solid var(--line);color:var(--text-muted);border-radius:var(--radius);padding:4px 8px;font-size:11.5px;font-weight:600;}
.icon-btn:hover{color:var(--text);border-color:var(--text-dim);}

/* ---------- QOL: toast notifications ---------- */
#toastRoot{position:fixed;bottom:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast{background:var(--bg-raised-2);border:1px solid var(--line);border-left:3px solid var(--spike);color:var(--text);
  padding:9px 14px;border-radius:var(--radius);font-size:12.5px;box-shadow:0 4px 16px rgba(0,0,0,0.3);
  animation:toastIn .15s ease-out; max-width:280px;}
.toast.ok{border-left-color:var(--green);}
.toast.error{border-left-color:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---------- QOL: confirm modal ---------- */
.confirm-modal{max-width:360px;}
.confirm-modal .modal-body{font-size:13px;color:var(--text-muted);}

/* ---------- QOL: player profile ---------- */
.player-row-click{cursor:pointer;}
.player-row-click:hover td{background:var(--bg-raised);}
.progress-bar-outer{background:var(--bg-void);border:1px solid var(--line);border-radius:20px;height:8px;overflow:hidden;margin:8px 0;}
.progress-bar-inner{background:var(--spike);height:100%;border-radius:20px;transition:width .2s;}
.completion-item{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--line-soft);font-size:12.5px;}
.completion-item:last-child{border-bottom:none;}

/* ---------- QOL: status filter pills ---------- */
.status-filter-row{display:flex;gap:4px;padding:10px 12px 0;}
.status-filter-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg-void);color:var(--text-muted);}
.status-filter-btn.active{background:var(--spike-dim);border-color:var(--spike);color:var(--text);}

/* ---------- QOL: nav badge ---------- */
.nav-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:15px;height:15px;padding:0 4px;margin-left:5px;
  background:var(--spike);color:#fff;font-size:9.5px;font-weight:700;
  border-radius:8px;font-family:'JetBrains Mono',monospace;vertical-align:2px;
}

/* ---------- QOL: NEW pill ---------- */
.tag-pill.new{background:var(--spike-dim);border-color:var(--spike);color:var(--text);}
body.light-theme .tag-pill.new{color:var(--spike);}

/* ---------- QOL: legacy section divider ---------- */
.legacy-divider{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);
  background:var(--bg-raised);border-bottom:1px solid var(--line);border-top:1px solid var(--line);
}
.legacy-divider .line{flex:1;height:1px;background:var(--line);}

/* ---------- QOL: command palette ---------- */
.cmdk-modal{max-width:560px;padding:0;}
.cmdk-input-wrap{padding:12px 14px;border-bottom:1px solid var(--line);}
.cmdk-input-wrap input{
  width:100%;background:none;border:none;outline:none;color:var(--text);
  font-size:15px;font-family:'Inter',sans-serif;
}
.cmdk-list{max-height:50vh;overflow-y:auto;padding:6px;}
.cmdk-group-label{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);font-weight:700;padding:8px 8px 4px;}
.cmdk-item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;
}
.cmdk-item .cmdk-main{display:flex;align-items:center;gap:8px;min-width:0;}
.cmdk-item .cmdk-icon{flex:none;width:20px;text-align:center;color:var(--text-dim);font-size:12px;}
.cmdk-item .cmdk-label{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmdk-item .cmdk-sub{color:var(--text-dim);font-size:11px;flex:none;}
.cmdk-item.active{background:var(--bg-raised-2);}
.cmdk-item.active .cmdk-label{color:var(--spike);}
.cmdk-empty{padding:24px 12px;text-align:center;color:var(--text-dim);font-size:12.5px;}
.cmdk-foot{
  display:flex;gap:12px;padding:8px 14px;border-top:1px solid var(--line);
  background:var(--bg-raised);font-size:10.5px;color:var(--text-dim);
}
.search-trigger-btn{display:flex;align-items:center;gap:6px;color:var(--text-muted);}

/* ---------- QOL: requirement note ---------- */
.req-hint{font-size:11px;color:var(--text-dim);margin-top:-4px;margin-bottom:8px;}
.req-hint.bad{color:var(--red);}

@media(max-width:520px){.list-toolbar-row{flex-direction:column;} .sort-select{width:100%;}}

/* ---------- QOL: upcoming levels ---------- */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.upcoming-card{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:8px;
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.upcoming-card:hover{transform:translateY(-3px);border-color:var(--text-dim);box-shadow:0 6px 18px rgba(0,0,0,0.25);}
.upcoming-card .uc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.upcoming-card .uc-name{font-weight:700;font-size:14.5px;}
.upcoming-card .uc-creator{font-size:11.5px;color:var(--text-dim);margin-top:1px;display:flex;align-items:center;gap:4px;}
.upcoming-card .uc-rank{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);
  border:1px solid var(--line);border-radius:2px;padding:1px 6px;flex:none;
}
.upcoming-card .uc-video{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);}
.upcoming-card .uc-video iframe{width:100%;height:100%;border:none;}
.upcoming-card .uc-video .noVideo{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11.5px;}
.upcoming-card .uc-desc{font-size:12px;color:var(--text-muted);line-height:1.4;}
.upcoming-card .uc-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.upcoming-card .uc-reorder{display:flex;gap:4px;}

/* ---------- animations ---------- */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes rankPulse{0%,100%{box-shadow:0 0 0 rgba(255,59,107,0);}50%{box-shadow:0 0 12px var(--spike-shadow);}}

.tab-panel.active{animation:fadeSlideIn .28s ease both;}
.demon-row{animation:fadeSlideIn .22s ease both;}
.upcoming-card{animation:fadeSlideIn .22s ease both;}
.demon-row{transition:background .15s ease, transform .15s ease;}
.demon-row:hover{transform:translateX(2px);}
.rank-badge.top{animation:rankPulse 2.6s ease-in-out infinite;}
.rank-badge{transition:transform .15s ease;}
.rank-badge.pop{animation:badgePop .35s ease;}
@keyframes badgePop{0%{transform:scale(1);}45%{transform:scale(1.3);}100%{transform:scale(1);}}
.stat-card{transition:transform .15s ease, border-color .15s ease;}
.stat-card:hover{transform:translateY(-2px);border-color:var(--text-dim);}
.btn{transition:transform .1s ease, background .1s ease, border-color .1s ease;}
.btn:active{transform:scale(.96);}
.modal-backdrop{animation:fadeIn .15s ease both;}
.modal{animation:popIn .18s ease both;}
.toast{animation:toastIn .2s ease both;}
.lb-table tr{animation:fadeSlideIn .22s ease both;}
nav.side-tabs button.active{transition:background .15s ease;}

@media (prefers-reduced-motion: reduce){
  .tab-panel.active,.demon-row,.upcoming-card,.rank-badge.top,.modal-backdrop,.modal,.toast,.lb-table tr{animation:none !important;}
  .demon-row:hover,.stat-card:hover,.upcoming-card:hover{transform:none;}
}

/* ---------- theme transition ---------- */
body,.sidebar,.panel,.bg-raised,.stat-card,.demon-row,.upcoming-card,.modal{
  transition:background-color .25s ease, border-color .25s ease, color .25s ease;
}

/* ---------- QOL: init loader ---------- */
#initLoader{
  position:fixed;inset:0;z-index:500;background:var(--bg-void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .3s ease, visibility .3s ease;
}
#initLoader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.loader-mark{width:22px;height:22px;background:var(--spike);border-radius:4px;animation:loaderPulse 1s ease-in-out infinite;}
@keyframes loaderPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(0.75);opacity:0.6;}}
.loader-skeleton{width:280px;display:flex;flex-direction:column;gap:8px;}
.skel-row{height:14px;border-radius:3px;background:linear-gradient(90deg,var(--bg-raised) 25%,var(--bg-raised-2) 37%,var(--bg-raised) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

/* ---------- QOL: scroll to top ---------- */
#scrollTopBtn{
  position:fixed;right:18px;bottom:18px;z-index:60;
  width:36px;height:36px;border-radius:50%;
  background:var(--bg-raised-2);border:1px solid var(--line);color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  opacity:0;visibility:hidden;transform:translateY(8px);
  transition:opacity .2s ease, transform .2s ease, visibility .2s ease, background .15s ease, color .15s ease;
  box-shadow:0 4px 14px rgba(0,0,0,0.3);
}
#scrollTopBtn.show{opacity:1;visibility:visible;transform:translateY(0);}
#scrollTopBtn:hover{color:var(--text);background:var(--bg-raised);border-color:var(--spike);}


/* ---------- QOL: favorite star ---------- */
.fav-star{
  background:none;border:none;font-size:14px;line-height:1;flex:none;
  color:var(--text-dim);padding:2px;transition:transform .15s ease, color .15s ease;
}
.fav-star:hover{color:var(--gold);}
.fav-star.active{color:var(--gold);}
.fav-star.pop{animation:starPop .35s ease;}
@keyframes starPop{0%{transform:scale(1);}40%{transform:scale(1.5);}100%{transform:scale(1);}}
.demon-row.favorited{border-left:3px solid var(--gold);padding-left:9px;}

/* ---------- QOL: personal progress ---------- */
.progress-bar-wrap{background:var(--bg-raised);border:1px solid var(--line);border-radius:20px;height:8px;overflow:hidden;margin-top:6px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--spike),var(--spike-hover));border-radius:20px;width:0;transition:width .6s cubic-bezier(.22,1,.36,1);}
.complete-check{
  background:none;border:1px solid var(--line);color:var(--text-muted);border-radius:var(--radius);
  padding:6px 12px;font-size:12.5px;font-weight:600;transition:all .15s ease;
}
.complete-check.done{background:rgba(74,222,128,0.1);border-color:var(--green);color:var(--green);}
.complete-check.done:active{animation:starPop .3s ease;}

/* ---------- QOL: leaderboard top3 shine ---------- */
.lb-rank.r1,.lb-rank.r2,.lb-rank.r3{position:relative;}
.lb-table tr:hover .lb-rank.r1,.lb-table tr:hover .lb-rank.r2,.lb-table tr:hover .lb-rank.r3{
  text-shadow:0 0 8px currentColor;
}

/* ---------- QOL: roulette spin + feedback animation ---------- */
@keyframes spinKick{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(0.92);}100%{transform:rotate(360deg) scale(1);}}
.btn.spinning{animation:spinKick .5s ease;}
@keyframes feedbackPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.roulette-feedback.pass,.roulette-feedback.fail{animation:feedbackPop .25s ease both;}
.roulette-target{transition:color .15s ease;}
.roulette-streak-row{display:flex;gap:10px;justify-content:center;margin-top:10px;font-size:11.5px;color:var(--text-dim);}
.roulette-streak-row b{color:var(--text);font-family:'JetBrains Mono',monospace;}

/* ---------- QOL: copy feedback ---------- */
.icon-btn.copied{color:var(--green);border-color:var(--green);}

/* ---------- QOL: tag chip press ---------- */
.tag-chip,.status-filter-btn{transition:transform .1s ease, background .12s ease, border-color .12s ease;}
.tag-chip:active,.status-filter-btn:active{transform:scale(.94);}
/* ---------- QOL: announcement banner ---------- */
.announcement-banner{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--spike-dim);border:1px solid var(--spike);border-radius:var(--radius);
  padding:9px 14px;margin-bottom:16px;font-size:12.5px;color:var(--text);
  animation:fadeSlideIn .3s ease both;
}
.announcement-close{background:none;border:none;color:var(--text);font-size:16px;line-height:1;opacity:.7;}
.announcement-close:hover{opacity:1;}

/* ---------- QOL: chat ---------- */
.chat-messages{max-height:60vh;min-height:200px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{animation:fadeSlideIn .2s ease both;}
.chat-msg-head{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);margin-bottom:2px;}
.chat-msg-user{font-weight:700;color:var(--text);font-size:12px;}
.chat-msg-del{background:none;border:none;color:var(--text-dim);margin-left:auto;font-size:14px;}
.chat-msg-del:hover{color:var(--red);}
.chat-msg-text{font-size:13px;color:var(--text-muted);line-height:1.4;word-break:break-word;}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);}
.chat-input-row input{flex:1;background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:var(--radius);font-size:13px;outline:none;}
.chat-input-row input:focus{border-color:var(--spike);}

/* ---------- QOL: level badges ---------- */
.lvl-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.03em;}
.lvl-badge.verified{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.lvl-badge.buffed{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.lvl-badge.nerfed{background:rgba(255,84,112,0.1);color:var(--red);border:1px solid rgba(255,84,112,.25);}
.lvl-badge.featured{background:rgba(255,184,69,0.12);color:var(--gold);border:1px solid rgba(255,184,69,.3);}

/* ---------- QOL: featured banner ---------- */
.featured-banner{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(90deg, var(--spike-dim), transparent);border:1px solid var(--line);
  border-left:3px solid var(--gold);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;
  cursor:pointer;transition:border-color .15s ease;
}
.featured-banner:hover{border-color:var(--gold);}

/* ---------- QOL: demon thumbnail ---------- */
.demon-thumb{width:34px;height:22px;flex:none;border-radius:2px;object-fit:cover;background:var(--bg-raised-2);border:1px solid var(--line);}

/* ---------- QOL: rating bars ---------- */
.rating-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-dim);margin-top:4px;}
.rating-bar-wrap{flex:1;height:5px;background:var(--bg-raised);border-radius:4px;overflow:hidden;max-width:100px;}
.rating-bar-fill{height:100%;background:var(--cyan);border-radius:4px;}

/* ---------- QOL: like button ---------- */
.like-btn{background:none;border:1px solid var(--line);border-radius:var(--radius);color:var(--text-muted);padding:5px 10px;font-size:12px;transition:all .15s ease;}
.like-btn.liked{color:var(--red);border-color:var(--red);background:rgba(255,84,112,.08);}
.like-btn:active{animation:starPop .3s ease;}

/* ---------- QOL: manage users list ---------- */
.user-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px;}
.user-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<div id="initLoader">
  <div class="loader-mark"></div>
  <div class="loader-skeleton">
    <div class="skel-row" style="width:60%;"></div>
    <div class="skel-row" style="width:100%;"></div>
    <div class="skel-row" style="width:85%;"></div>
  </div>
</div>

<button id="scrollTopBtn" title="Back to top" onclick="scrollToTop()">&#8593;</button>

  </div>

    <button data-tab="stats"><span class="si">📊</span>Stats</button>

    </div>
  </div>
</div>

<div id="toastRoot"></div>

<script>
/* ============================= PRESETS & PALETTES ============================= */
const ACCENT_PALETTES = {
  pink: { main: '#ff3b6b', dim: '#541424', hover: '#ff5580', shadow: 'rgba(255,59,107,0.25)' },
  red: { main: '#ff4a4a', dim: '#541414', hover: '#ff6161', shadow: 'rgba(255,74,74,0.25)' },
  blue: { main: '#3b82f6', dim: '#13284a', hover: '#5091f7', shadow: 'rgba(59,130,246,0.25)' },
  purple: { main: '#a855f7', dim: '#351654', hover: '#b56ff8', shadow: 'rgba(168,85,247,0.25)' },
  green: { main: '#22c55e', dim: '#0d421f', hover: '#39d372', shadow: 'rgba(34,197,94,0.25)' },
  orange: { main: '#f97316', dim: '#542403', hover: '#fa8432', shadow: 'rgba(249,115,22,0.25)' },
  cyan: { main: '#06b6d4', dim: '#053942', hover: '#1cd1f0', shadow: 'rgba(6,182,212,0.25)' }
};

/* ============================= STATE ============================= */
const APP = {
  demons: [],
  upcoming: [],
  players: [],
  submissions: [],
  registeredUsers: [], // Normal public registered users storage
  profiles: [], // { username, bio, avatarEmoji, country, socials }
  chatMessages: [],
  changelog: [],
  snapshots: [], // Time Machine snapshots: { date, ts, demons }
  currentUser: null,
  activeTab: 'list',
  selectedDemonId: null,
  timeMachineDate: 'now',
  roulette: { required: 1, current: null, usedIds: [], history: [], done:false, streak:0, bestStreak:0 },
  settings: {
    siteName: "Double Entendre",
    siteTagline: "The hardest levels, ranked by difficulty.",
    accentColor: "pink",
    themeMode: "dark", // "dark" or "light"
    mainListSize: 50, // demons ranked beyond this fall into the Extended List
    extendedListSize: 100, // demons ranked beyond this fall into the Legacy List

async function storageGet(key){
  try{
    const r = await fetch('/api/storage?key=' + encodeURIComponent(key));
    if(!r.ok) return null;
    const data = await r.json();
    return data.value ?? null;
  }catch(e){ console.error('Storage read fault', e); return null; }
}
async function storageSet(key, value){
  try{
    await fetch('/api/storage', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ key, value })
    });
  }catch(e){ console.error('Storage write fault', e); }
}

function takeSnapshot(){
  const today = new Date().toISOString().slice(0,10);
  if(APP.snapshots.length && APP.snapshots[APP.snapshots.length-1].date === today){
    APP.snapshots[APP.snapshots.length-1].demons = JSON.parse(JSON.stringify(APP.demons));
  }else{
    APP.snapshots.push({ date: today, ts: Date.now(), demons: JSON.parse(JSON.stringify(APP.demons)) });
    if(APP.snapshots.length > 60) APP.snapshots = APP.snapshots.slice(-60);
  }
  saveSnapshots();
}

/* ============================= AUTH ============================= */
async function loginAccount(username, password){
  const normalizedUser = username.trim().toLowerCase();
  
  if(DIRECT_AUTH[normalizedUser]){
    const obscuredInput = btoa(password.split('').reverse().join(''));
    if(obscuredInput === DIRECT_AUTH[normalizedUser]){
      APP.currentUser = { username: normalizedUser === 'tamari' ? 'tamari' : 'hakku', role: 'admin' };
      saveSession();
      return APP.currentUser;
    } else {
      throw new Error('Incorrect password.');
    }
  }
  
  const matchedUser = APP.registeredUsers.find(u => u.username.toLowerCase() === normalizedUser);
  if(matchedUser && matchedUser.banned){
    throw new Error('This account has been banned.');
  }
  if(matchedUser && matchedUser.password === btoa(password)) {
    APP.currentUser = { username: matchedUser.username, role: 'user' };
    saveSession();
    return APP.currentUser;
  }
  
  throw new Error('No account with that username.');
}

async function registerAccount(username, password){
  const cleanUser = username.trim();
  const normalizedUser = cleanUser.toLowerCase();
  if(!cleanUser || !password) {
    throw new Error('Username and password cannot be blank.');
  }
  if(DIRECT_AUTH[normalizedUser] || APP.registeredUsers.some(u => u.username.toLowerCase() === normalizedUser)) {
    throw new Error('That username is already taken.');
  }

  const newUser = {
    username: cleanUser,
    password: btoa(password), 
    role: 'user'
  };

  APP.registeredUsers.push(newUser);
  await saveUsers();
  
  APP.currentUser = { username: newUser.username, role: 'user' };
  saveSession();
  return APP.currentUser;
}
  
function saveSession(){
  try{ localStorage.setItem('demonlist_session', JSON.stringify(APP.currentUser)); }catch(e){}
}
  
function restoreSession(){
  try{
    const raw = localStorage.getItem('demonlist_session');
    if(raw) APP.currentUser = JSON.parse(raw);
  }catch(e){}
}
  
function logout(){

/* ============================= HELPERS ============================= */
function uid(){ return 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2, 10); }
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getEmbedUrl(url){
  if(!url) return null;
  try{
    const u = new URL(url);
    if(u.hostname.includes('youtu.be')) return 'https://www.youtube.com/embed/'+u.pathname.slice(1);
    if(u.hostname.includes('youtube.com')){
      const id = u.searchParams.get('v');
      if(id) return 'https://www.youtube.com/embed/'+id;
      if(u.pathname.startsWith('/embed/')) return url;
      if(u.pathname.startsWith('/live/')) return 'https://www.youtube.com/embed/'+u.pathname.split('/')[2];
    }
    if(u.hostname.includes('streamable.com')) return 'https://streamable.com/e/'+u.pathname.slice(1);
    return null;
  }catch(e){ return null; }
}
function getYoutubeId(url){
  if(!url) return null;
  try{
    const u = new URL(url);
    if(u.hostname.includes('youtu.be')) return u.pathname.slice(1);
    if(u.hostname.includes('youtube.com')){
      const id = u.searchParams.get('v');
      if(id) return id;
      if(u.pathname.startsWith('/embed/')) return u.pathname.split('/')[2];
      if(u.pathname.startsWith('/live/')) return u.pathname.split('/')[2];
    }
  }catch(e){}
  return null;
}
function getThumbnailUrl(d){
  if(!d) return null;
  if(d.thumbnail) return d.thumbnail;
  const yid = getYoutubeId(d.video) || getYoutubeId(d.verifyVideo);
  if(yid) return `https://img.youtube.com/vi/${yid}/mqdefault.jpg`;
  return null;
}
function formatPublishDate(d){
  if(!d || !d.publishDate) return null;
  try{

/* ============================= QOL: COUNT-UP ANIMATION ============================= */
function animateCounters(container){
  if(!container) return;
  const nodes = container.querySelectorAll('[data-count]');
  if(!nodes.length) return;
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  nodes.forEach(el => {
    const target = parseInt(el.dataset.count, 10);
    const suffix = el.dataset.suffix || '';
    if(isNaN(target)){ return; }
    if(reduce || target === 0){ el.textContent = target + suffix; return; }
    const dur = 500;
    const start = performance.now();
    function step(now){
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased) + suffix;
      if(p < 1) requestAnimationFrame(step);
      else el.textContent = target + suffix;
    }
    requestAnimationFrame(step);
  });
}

/* ============================= QOL: COMMAND PALETTE ============================= */
let __cmdkItems = [];
let __cmdkActive = 0;
function buildCommandItems(query){
  const q = (query||'').trim().toLowerCase();
  const items = [];
  const tabs = [
    { label:'Demon List', sub:'Go to tab', tab:'list' },
    { label:'Upcoming', sub:'Go to tab', tab:'upcoming' },
    { label:'Roulette', sub:'Go to tab', tab:'roulette' },
    { label:'Leaderboard', sub:'Go to tab', tab:'leaderboard' },
    { label:'Hall of Fame', sub:'Go to tab', tab:'halloffame' },
    { label:'Submit Play', sub:'Go to tab', tab:'submit' },
    { label:'Stats', sub:'Go to tab', tab:'stats' },
  ];
  tabs.forEach(t => {
    if(!q || t.label.toLowerCase().includes(q)){
      items.push({ group:'Go to', icon:'▤', label:t.label, sub:t.sub, action:()=>switchTab(t.tab) });
    }
  });
  APP.demons.forEach((d,i) => {
    if(!q || d.name.toLowerCase().includes(q) || (d.creator||'').toLowerCase().includes(q)){
      items.push({ group:'Demons', icon:'#'+(i+1), label:d.name, sub:d.points+'pt', action:()=>{ switchTab('list'); selectDemon(d.id); } });
    }
  });
  APP.upcoming.forEach(u => {
    if(!q || u.name.toLowerCase().includes(q) || (u.creator||'').toLowerCase().includes(q)){
      items.push({ group:'Upcoming', icon:flagEmoji(u.country), label:u.name, sub:'Upcoming', action:()=>switchTab('upcoming') });
    }
  });
  APP.players.forEach(p => {
    if(!q || p.name.toLowerCase().includes(q)){
      items.push({ group:'Players', icon:flagEmoji(p.country), label:p.name, sub:p.points+'pt', action:()=>{ switchTab('leaderboard'); openPlayerProfile(p.id); } });
    }
  });
  return items.slice(0, 40);
}
function openCommandPalette(){
  __cmdkActive = 0;
  openModal(`
  <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="modal cmdk-modal">
      <div class="cmdk-input-wrap"><input id="cmdk-input" placeholder="Search demons, players, or jump to a tab..." oninput="renderCommandResults(this.value)"></div>
      <div class="cmdk-list" id="cmdk-list"></div>
      <div class="cmdk-foot"><span>↑↓ Navigate</span><span>Enter Select</span><span>Esc Close</span></div>
    </div>
  </div>`);
  renderCommandResults('');
  const input = document.getElementById('cmdk-input');
  if(input){ input.focus(); input.addEventListener('keydown', handleCommandKeydown); }
}
function renderCommandResults(query){
  __cmdkItems = buildCommandItems(query);
  __cmdkActive = 0;
  const list = document.getElementById('cmdk-list');
  if(!list) return;
  if(!__cmdkItems.length){ list.innerHTML = `<div class="cmdk-empty">No matches found.</div>`; return; }
  let lastGroup = null;
  list.innerHTML = __cmdkItems.map((item, i) => {
    const groupLabel = item.group !== lastGroup ? `<div class="cmdk-group-label">${escapeHtml(item.group)}</div>` : '';
    lastGroup = item.group;
    return `${groupLabel}<div class="cmdk-item ${i===0?'active':''}" data-idx="${i}" onclick="runCommandItem(${i})">
      <div class="cmdk-main"><span class="cmdk-icon">${escapeHtml(String(item.icon||'›'))}</span><span class="cmdk-label">${escapeHtml(item.label)}</span></div>
      <span class="cmdk-sub">${escapeHtml(item.sub||'')}</span>
    </div>`;
  }).join('');
}
function setCommandActive(idx){
  if(!__cmdkItems.length) return;
  __cmdkActive = Math.max(0, Math.min(__cmdkItems.length-1, idx));
  document.querySelectorAll('.cmdk-item').forEach(el => el.classList.toggle('active', parseInt(el.dataset.idx)===__cmdkActive));
  const activeEl = document.querySelector('.cmdk-item.active');
  if(activeEl) activeEl.scrollIntoView({block:'nearest'});
}
function runCommandItem(idx){
  const item = __cmdkItems[idx];
  if(!item) return;
  closeModal();
  item.action();
}
function handleCommandKeydown(e){
  if(e.key === 'ArrowDown'){ e.preventDefault(); setCommandActive(__cmdkActive+1); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); setCommandActive(__cmdkActive-1); }
  else if(e.key === 'Enter'){ e.preventDefault(); if(__cmdkItems.length) runCommandItem(__cmdkActive); }
}

/* ============================= QOL: KEYBOARD SHORTCUTS ============================= */
document.addEventListener('keydown', e => {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  const backdrop = document.querySelector('.modal-backdrop');

  if((e.key === 'k' || e.key === 'K') && (e.ctrlKey || e.metaKey)){
    e.preventDefault();
    if(backdrop) closeModal();
    openCommandPalette();
    return;
  }
  if(e.key === 'Escape'){
    if(backdrop){ closeModal(); if(window.__confirmResolve){ window.__confirmResolve(false); window.__confirmResolve=null; } }
    return;
  }
  if(backdrop) return;
  if(e.key === '/' && !typing){
    const search = document.getElementById('list-search');
    if(search && APP.activeTab === 'list'){ e.preventDefault(); search.focus(); }
    return;
  }
  if(!typing && APP.activeTab === 'list' && (e.key === 'ArrowDown' || e.key === 'ArrowUp')){
    e.preventDefault();
    moveListSelection(e.key === 'ArrowDown' ? 1 : -1);
  }
  if(!typing && !e.ctrlKey && !e.metaKey && !e.altKey && '123456'.includes(e.key)){
    const order = ['list','upcoming','roulette','leaderboard','submit','stats'];
    const tab = order[parseInt(e.key,10)-1];
    if(tab && document.getElementById('panel-'+tab)){ e.preventDefault(); switchTab(tab); }
  }
});

function allDemonTags(){
  const set = new Set();
  APP.demons.forEach(d => (d.tags||[]).forEach(t => set.add(t)));
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function getListStatus(rank){
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);
  if(rank < mainSize) return 'Main';
  if(rank < extSize) return 'Extended';
  return 'Legacy';
}
function getFilteredSortedDemons(){
  const demons = APP.demons;
  const { search, tags, sort, section, favoritesOnly } = APP.listFilter;
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);
  const q = search.trim().toLowerCase();
  let list = demons.map((d,i) => ({ d, rank: i }));
  if(section === 'main') list = list.filter(({rank}) => rank < mainSize);
  else if(section === 'extended') list = list.filter(({rank}) => rank >= mainSize && rank < extSize);
  else if(section === 'legacy') list = list.filter(({rank}) => rank >= extSize);
  if(favoritesOnly){
    const favs = getFavorites();
    list = list.filter(({d}) => favs.has(d.id));
  }
  if(q){
    list = list.filter(({d}) =>
      d.name.toLowerCase().includes(q) ||
      (d.creator||'').toLowerCase().includes(q) ||
      (d.verifier||'').toLowerCase().includes(q) ||
      countryName(d.country).toLowerCase().includes(q)
    );
  }
  if(tags.length){
    list = list.filter(({d}) => tags.every(t => (d.tags||[]).includes(t)));
  }
  const sorted = list.slice();
  if(sort === 'points-desc') sorted.sort((a,b)=>b.d.points-a.d.points);
  else if(sort === 'points-asc') sorted.sort((a,b)=>a.d.points-b.d.points);
  else if(sort === 'az') sorted.sort((a,b)=>a.d.name.localeCompare(b.d.name));
  else if(sort === 'newest') sorted.sort((a,b)=>(b.d.addedAt||0)-(a.d.addedAt||0));
  else sorted.sort((a,b)=>a.rank-b.rank); // rank = default list order
  return sorted;
}

function setListSort(v){ APP.listFilter.sort = v; renderListTab(); }
function setListSection(v){ APP.listFilter.section = v; renderListTab(); }
function toggleFavoritesOnly(){ APP.listFilter.favoritesOnly = !APP.listFilter.favoritesOnly; renderListTab(); }
function toggleListTagFilter(t){
  const i = APP.listFilter.tags.indexOf(t);
  if(i===-1) APP.listFilter.tags.push(t); else APP.listFilter.tags.splice(i,1);
  renderListTab();
}
function exportDemonListCsv(){
  const demons = APP.demons;
  if(!demons.length){ showToast('No demons to export', 'error'); return; }
  const header = 'Rank,Name,Level ID,Creator,Verifier,Country,Points,Requirement,Song Artist,Song Name,Publish Date\n';
  const rows = demons.map((d,i) => `${i+1},"${(d.name||'').replace(/"/g,'""')}","${(d.levelId||'').replace(/"/g,'""')}","${(d.creator||'').replace(/"/g,'""')}","${(d.verifier||'').replace(/"/g,'""')}",${countryName(d.country)},${d.points},${d.requirement||100},"${(d.songArtist||'').replace(/"/g,'""')}","${(d.songName||'').replace(/"/g,'""')}",${d.publishDate||''}`).join('\n');
  const blob = new Blob([header+rows], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'demon-list.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}
function renderListTab(preserveFocus){
  const el = document.getElementById('panel-list');
  const demons = APP.demons;
  if(!APP.selectedDemonId && demons.length) APP.selectedDemonId = demons[0].id;
  const selected = demons.find(d => d.id === APP.selectedDemonId);
  const filtered = getFilteredSortedDemons();

  const totalPoints = demons.reduce((s,d)=>s+(d.points||0),0);
  const hardest = demons[0];
  const mainSize = APP.settings.mainListSize || 50;
  const extSize = Math.max(mainSize, APP.settings.extendedListSize || mainSize);
  const hasExtended = demons.length > mainSize && extSize > mainSize;
  const hasLegacy = demons.length > extSize;
  const mainListDemons = demons.slice(0, mainSize);
  const completed = getCompleted();
  const completedCount = mainListDemons.filter(d => completed.has(d.id)).length;
  const progressPct = mainListDemons.length ? Math.round((completedCount / mainListDemons.length) * 100) : 0;
  const featured = APP.settings.featuredDemonId ? APP.demons.find(d=>d.id===APP.settings.featuredDemonId) : null;
  const featuredBanner = featured ? `
    <div class="featured-banner" onclick="selectDemon('${featured.id}')">
      <div style="display:flex;align-items:center;gap:10px;min-width:0;">
        ${getThumbnailUrl(featured) ? `<img class="demon-thumb" style="width:48px;height:32px;" src="${escapeHtml(getThumbnailUrl(featured))}" alt="" onerror="this.remove()">` : ''}
        <div style="min-width:0;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);font-weight:700;">★ Featured Level</div>
          <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(featured.name)}</div>
        </div>
      </div>
      <span class="lvl-badge featured">Featured</span>
    </div>` : '';
  const statCards = demons.length ? `
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-val" data-count="${Math.min(demons.length,mainSize)}">0</div><div class="sc-lbl">Main List</div></div>
      <div class="stat-card"><div class="sc-val" data-count="${totalPoints}">0</div><div class="sc-lbl">Total Points</div></div>
      <div class="stat-card"><div class="sc-val" data-count="${APP.players.length}">0</div><div class="sc-lbl">Players</div></div>
      <div class="stat-card"><div class="sc-val" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${hardest?escapeHtml(hardest.name):'—'}</div><div class="sc-lbl">#1 Hardest</div></div>
      <div class="stat-card" style="grid-column:span 2;min-width:180px;">
        <div class="sc-val" data-count="${progressPct}" data-suffix="%">0</div><div class="sc-lbl">Your Progress (${completedCount}/${mainListDemons.length})</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="personalProgressFill" style="width:0%;"></div></div>
      </div>
    </div>` : '';

  const tags = allDemonTags();
  const tagChips = tags.length ? `
    <div class="tag-filter-row">
      ${tags.map(t => `<button class="tag-chip ${APP.listFilter.tags.includes(t)?'active':''}" onclick="toggleListTagFilter('${escapeHtml(t).replace(/'/g,"\\'")}')">${escapeHtml(t)}</button>`).join('')}
    </div>` : '';

  const sectionToggle = (hasExtended || hasLegacy) ? `
    <div class="status-filter-row" style="padding:10px 12px 0;">
      <button class="status-filter-btn ${APP.listFilter.section==='main'?'active':''}" onclick="setListSection('main')">Main List</button>
      ${hasExtended ? `<button class="status-filter-btn ${APP.listFilter.section==='extended'?'active':''}" onclick="setListSection('extended')">Extended List</button>` : ''}
      <button class="status-filter-btn ${APP.listFilter.section==='legacy'?'active':''}" onclick="setListSection('legacy')">Legacy List</button>
      <button class="status-filter-btn ${APP.listFilter.section==='all'?'active':''}" onclick="setListSection('all')">All</button>
    </div>` : '';

  const toolbar = `
    ${sectionToggle}
    <div class="list-toolbar">
      <div class="list-toolbar-row">
        <div class="search-input-wrap">
          <span class="si-icon">⌕</span>
          <input id="list-search" placeholder="Search by name, creator, verifier... (press /)" value="${escapeHtml(APP.listFilter.search)}" oninput="setListSearch(this.value)">
        </div>
        <select class="sort-select" onchange="setListSort(this.value)">
          <option value="rank" ${APP.listFilter.sort==='rank'?'selected':''}>List Order</option>
          <option value="points-desc" ${APP.listFilter.sort==='points-desc'?'selected':''}>Points: High to Low</option>
          <option value="points-asc" ${APP.listFilter.sort==='points-asc'?'selected':''}>Points: Low to High</option>
          <option value="az" ${APP.listFilter.sort==='az'?'selected':''}>Name: A-Z</option>
          <option value="newest" ${APP.listFilter.sort==='newest'?'selected':''}>Newest Added</option>
        </select>
        <button class="btn small ${APP.listFilter.favoritesOnly?'primary':'ghost'}" onclick="toggleFavoritesOnly()" title="Show only your favorited levels">★ Favorites</button>
      </div>
      ${tagChips}
    </div>
    ${filtered.length !== demons.length ? `<div class="result-count">${filtered.length} of ${demons.length} levels match</div>` : ''}
  `;

  const now = Date.now();
  const WEEK = 7*24*60*60*1000;
  const rowsArr = filtered.map(({d, rank}, idx) => {
    const i = rank;
    const tagsHtml = (d.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
    const isNew = d.addedAt && (now - d.addedAt) < WEEK;
    const delay = Math.min(idx, 12) * 18;
    const fav = isFavorite(d.id);
    const done = isCompleted(d.id);
    const rowHtml = `
    <div class="demon-row ${d.id===APP.selectedDemonId?'selected':''} ${fav?'favorited':''}" style="animation-delay:${delay}ms" onclick="selectDemon('${d.id}')">
      <button class="fav-star ${fav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${d.id}', this)" title="${fav?'Remove from favorites':'Add to favorites'}">${fav?'★':'☆'}</button>
      <div class="rank-badge ${i<3?'top':''}">${i+1}</div>
      ${getThumbnailUrl(d) ? `<img class="demon-thumb" src="${escapeHtml(getThumbnailUrl(d))}" alt="" loading="lazy" onerror="this.remove()">` : ''}
      <div class="info">
        <div class="name">${escapeHtml(d.name)}${done?' ✓':''}${d.difficultyChange==='buffed'?' <span class="lvl-badge buffed">Buffed</span>':''}${d.difficultyChange==='nerfed'?' <span class="lvl-badge nerfed">Nerfed</span>':''}${APP.settings.featuredDemonId===d.id?' <span class="lvl-badge featured">★</span>':''}</div>
        <div class="creator">${flagEmoji(d.country)} by ${escapeHtml(d.creator||'Unknown')}</div>
        ${tagsHtml || isNew ? `<div class="tag-container">${isNew ? `<span class="tag-pill new">New</span>` : ''}${tagsHtml}</div>` : ''}
      </div>
      <div class="pts">${d.points}pt</div>
      ${isMod() ? `
      <div class="reorder">
        <button onclick="event.stopPropagation();moveDemon('${d.id}',-1)" ${i===0?'disabled':''}>&#9650;</button>
        <button onclick="event.stopPropagation();moveDemon('${d.id}',1)" ${i===demons.length-1?'disabled':''}>&#9660;</button>
      </div>` : ''}
    </div>`;
    const showExtDivider = APP.listFilter.section==='all' && APP.listFilter.sort==='rank' && i===mainSize && hasExtended && !APP.listFilter.search && !APP.listFilter.tags.length;
    const showLegDivider = APP.listFilter.section==='all' && APP.listFilter.sort==='rank' && i===extSize && hasLegacy && !APP.listFilter.search && !APP.listFilter.tags.length;
    let divider = '';
    if(showExtDivider) divider = `<div class="legacy-divider"><span class="line"></span>Extended List<span class="line"></span></div>`;
    else if(showLegDivider) divider = `<div class="legacy-divider"><span class="line"></span>Legacy List<span class="line"></span></div>`;
    return divider + rowHtml;
  });

  const rows = demons.length ? (filtered.length ? rowsArr.join('') : `<div class="empty-state"><div class="big">No matches</div>Try a different search or clear your tag filters.</div>`)
   : `<div class="empty-state"><div class="big">No demons yet</div>${isMod() ? 'Add one to get started.' : 'Check back soon.'}</div>`;

  const detail = selected ? renderDemonDetail(selected, demons.findIndex(d=>d.id===selected.id)) :
    `<div class="empty-state"><div class="big">Nothing selected</div>Pick a level from the list.</div>`;

  el.innerHTML = `
    <div class="page-head">
      <h1 class="page-title site-name-text">${escapeHtml(APP.settings.siteName)}</h1>
      <p class="page-desc site-tagline-text">${escapeHtml(APP.settings.siteTagline)}</p>
    </div>
    ${featuredBanner}
    ${statCards}
    <div class="list-layout">
      <div class="panel">
        <div class="panel-head">
          <h3>Levels <span class="kbd-hint">/</span></h3>
          <div style="display:flex;gap:6px;">
            ${demons.length ? `<button class="btn small ghost" onclick="exportDemonListCsv()">Export CSV</button>` : ''}
            ${isMod() ? `<button class="btn small primary" onclick="openDemonModal()">+ Add Demon</button>` : ''}
          </div>
        </div>
        ${demons.length ? toolbar : ''}
        <div class="demon-rows">${rows}</div>
      </div>
      <div class="panel"><div class="detail">${detail}</div></div>
    </div>
  `;
  if(preserveFocus){
    const s = document.getElementById('list-search');
    if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
  }
  animateCounters(el);
  const fill = document.getElementById('personalProgressFill');
  if(fill) requestAnimationFrame(() => { fill.style.width = progressPct + '%'; });
}
function selectDemon(id){
  APP.selectedDemonId = id;
  history.replaceState(null, '', location.pathname + location.search + '#demon-' + id);
  renderListTab();
  const badge = document.querySelector('.demon-row.selected .rank-badge');
  if(badge){ badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop'); }
}
function renderDemonDetail(d, index){
  const embed = getEmbedUrl(d.video);
  const tagHtml = (d.tags || []).map(t => `<span class="tag-pill" style="font-size:11px; padding:2px 6px;">${escapeHtml(t)}</span>`).join(' ');
  const fav = isFavorite(d.id);
  const done = isCompleted(d.id);
  const banner = getThumbnailUrl(d);
  const songLabel = [d.songArtist, d.songName].filter(Boolean).join(' - ');
  const publishLabel = formatPublishDate(d);
  const metaParts = [];
  if(d.levelId) metaParts.push(`<span><b>Level ID:</b> ${escapeHtml(String(d.levelId))}</span>`);
  if(songLabel) metaParts.push(`<span><b>Song:</b> ${escapeHtml(songLabel)}</span>`);
  if(publishLabel) metaParts.push(`<span><b>Published:</b> ${escapeHtml(publishLabel)}</span>`);
  const hasVerify = !!d.verifyVideo;
  const status = getListStatus(index);
  const isFeatured = APP.settings.featuredDemonId === d.id;

  const badges = [];
  if(d.lengthTag) badges.push(`<span class="lvl-badge" style="background:var(--bg-raised-2);color:var(--text-muted);border:1px solid var(--line);">${escapeHtml(d.lengthTag)}</span>`);
  if(d.difficultyChange==='buffed') badges.push(`<span class="lvl-badge buffed">Buffed</span>`);
  if(d.difficultyChange==='nerfed') badges.push(`<span class="lvl-badge nerfed">Nerfed</span>`);
  if(isFeatured) badges.push(`<span class="lvl-badge featured">Featured</span>`);

  const likeCount = Object.keys(d.likes||{}).length;
  const liked = APP.currentUser && d.likes && d.likes[APP.currentUser.username.toLowerCase()];
  const enj = getEnjoymentAverage(d);
  const myRating = APP.currentUser && d.enjoymentRatings ? d.enjoymentRatings[APP.currentUser.username.toLowerCase()] : null;

  const ratingBars = (d.decoRating || d.gameplayRating) ? `
    <div style="margin-top:10px;">
      ${d.decoRating ? `<div class="rating-row"><span style="width:64px;">Deco</span><div class="rating-bar-wrap"><div class="rating-bar-fill" style="width:${d.decoRating*10}%;"></div></div><span>${d.decoRating}/10</span></div>` : ''}
      ${d.gameplayRating ? `<div class="rating-row"><span style="width:64px;">Gameplay</span><div class="rating-bar-wrap"><div class="rating-bar-fill" style="width:${d.gameplayRating*10}%;"></div></div><span>${d.gameplayRating}/10</span></div>` : ''}
    </div>` : '';

  const enjoymentWidget = `
    <div style="margin-top:8px;">
      <div class="rating-row"><span style="width:64px;">Enjoyment</span><div class="rating-bar-wrap"><div class="rating-bar-fill" style="width:${enj?enj.avg*10:0}%;background:var(--gold);"></div></div><span>${enj?`${enj.avg}/10 (${enj.count})`:'No ratings yet'}</span></div>
      ${APP.currentUser ? `<div style="display:flex;gap:3px;margin-top:4px;">${Array.from({length:10},(_,n)=>n+1).map(n=>`<button class="btn ghost small" style="padding:2px 6px;font-size:10.5px;${myRating===n?'border-color:var(--gold);color:var(--gold);':''}" onclick="rateEnjoyment('${d.id}',${n})">${n}</button>`).join('')}</div>` : `<div class="hint" style="margin-top:2px;">Log in to rate this level's enjoyment.</div>`}
    </div>`;

  const records = APP.submissions.filter(s=>s.demonId===d.id && s.status==='approved').slice().sort((a,b)=>(b.percent-a.percent) || (a.submittedAt-b.submittedAt));
  const recordsHtml = records.length ? `
    <div class="panel-head" style="margin-top:16px;"><h3>Records (${records.length})</h3></div>
    <div class="demon-rows" style="max-height:220px;">
      ${records.map(s => `<div class="demon-row" style="cursor:default;"><div class="info"><div class="name">${escapeHtml(s.player)}</div><div class="creator">${flagEmoji(s.country)}${s.attempts?` · ${s.attempts} attempts`:''}</div></div><div class="pts">${s.percent}%</div></div>`).join('')}
    </div>` : '';

  const changelogEntries = (d.levelChangelog||[]).slice().reverse();
  const changelogHtml = `
    <div class="panel-head" style="margin-top:16px;"><h3>Level History</h3>${isMod() ? `<button class="btn small ghost" onclick="addLevelChangelogEntry('${d.id}')">+ Add Entry</button>` : ''}</div>
    ${changelogEntries.length ? `<div class="demon-rows" style="max-height:200px;">${changelogEntries.map(c => `<div class="demon-row" style="cursor:default;"><div class="info"><div class="name" style="font-size:12.5px;">${escapeHtml(c.text)}</div><div class="creator">${new Date(c.ts).toLocaleDateString()}${c.auto?' · auto':''}</div></div></div>`).join('')}</div>` : `<div class="hint" style="padding:8px 0;">No history yet.</div>`}`;

  return `
    ${banner ? `<div class="detail-banner"><img src="${escapeHtml(banner)}" alt="${escapeHtml(d.name)} thumbnail" onerror="this.parentElement.style.display='none'"></div>` : ''}
    <div class="detail-top">
      <div>
        <div class="detail-title">${fav?'★ ':''}${escapeHtml(d.name)}</div>
        <div class="detail-sub">${flagEmoji(d.country)} by <a href="javascript:void(0)" onclick="event.stopPropagation();openCreatorProfile('${escapeHtml(d.creator||'').replace(/'/g,"\\'")}')" style="color:inherit;text-decoration:underline;text-decoration-style:dotted;">${escapeHtml(d.creator||'Unknown')}</a>${d.verifier ? ' · verified by '+`<a href="javascript:void(0)" onclick="event.stopPropagation();openCreatorProfile('${escapeHtml(d.verifier).replace(/'/g,"\\'")}')" style="color:inherit;text-decoration:underline;text-decoration-style:dotted;">${escapeHtml(d.verifier)}</a>` : ''}</div>
        ${metaParts.length ? `<div class="detail-meta">${metaParts.join('')}</div>` : ''}
        ${badges.length ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">${badges.join('')}</div>` : ''}
        ${tagHtml ? `<div style="margin-top:8px; display:flex; gap:4px; flex-wrap:wrap;">${tagHtml}</div>` : ''}
      </div>
      <div>
        <button class="icon-btn" onclick="copyDemonLink('${d.id}', this)" title="Copy shareable link">🔗 Copy Link</button>
        ${isMod() ? `
        <button class="btn small" onclick="openDemonModal('${d.id}')">Edit</button>
        <button class="btn small danger" onclick="deleteDemon('${d.id}')">Delete</button>` : ''}
        ${isAdmin() ? `<button class="btn small ${isFeatured?'primary':'ghost'}" onclick="setFeaturedDemon('${d.id}')">${isFeatured?'★ Featured':'☆ Feature'}</button>` : ''}
      </div>
    </div>
    <div class="detail-actions" style="margin-top:0;margin-bottom:12px;">
      <button class="btn small ${fav?'primary':''}" onclick="toggleFavorite('${d.id}', null); renderListTab();">${fav?'★ Favorited':'☆ Favorite'}</button>
      <button class="complete-check ${done?'done':''}" onclick="toggleCompleted('${d.id}')">${done?'✓ Completed':'Mark as Completed'}</button>
      <button class="like-btn ${liked?'liked':''}" onclick="toggleLevelLike('${d.id}')">${liked?'♥':'♡'} ${likeCount}</button>
    </div>
    <div class="stat-row">
      <div class="stat rankstat"><div class="val">#${index+1}</div><div class="lbl">Placement</div></div>
      <div class="stat"><div class="val">${d.points}</div><div class="lbl">Points</div></div>
      <div class="stat"><div class="val">${d.requirement||100}%</div><div class="lbl">Requirement</div></div>
      ${d.requirement2 ? `<div class="stat"><div class="val">${d.requirement2}%+</div><div class="lbl">Reduced (${d.points2||0}pt)</div></div>` : ''}
      <div class="stat"><div class="val" style="${status!=='Main'?'color:var(--text-muted);':''}">${status}</div><div class="lbl">List Status</div></div>
      ${d.downloadCount ? `<div class="stat"><div class="val">${d.downloadCount.toLocaleString()}</div><div class="lbl">Downloads</div></div>` : ''}
    </div>
    ${ratingBars}
    ${enjoymentWidget}
    ${hasVerify ? `<div class="video-tabs">
      <button data-mode="gameplay" class="active" onclick="switchDetailVideo('gameplay','${d.id}')">Gameplay Showcase</button>
      <button data-mode="verify" onclick="switchDetailVideo('verify','${d.id}')">Verification</button>
    </div>` : ''}
    <div class="video-wrap" id="detailVideoWrap">${embed ? `<iframe src="${embed}" allowfullscreen></iframe>` : `<div class="noVideo">${d.video ? `<a href="${escapeHtml(d.video)}" target="_blank" style="color:var(--cyan);">Open video link ↗</a>` : 'No video yet'}</div>`}</div>
    ${d.description ? `<div class="detail-desc">${escapeHtml(d.description)}</div>` : ''}
    ${recordsHtml}
    ${changelogHtml}
  `;
}

  if(!isMod()) return;
  const editing = id ? APP.demons.find(d=>d.id===id) : null;
  const src = editing || prefill || null;
  const currentTagsString = src && src.tags ? src.tags.join(', ') : '';
  
  openModal(`
  <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${editing ? 'Edit Demon' : (prefill ? 'Promote to Main List' : 'Add Demon')}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>

        <div class="field"><label>Level Name</label><input id="dm-name" value="${src?escapeHtml(src.name):''}"></div>

          <div class="field"><label>Publish Date</label><input id="dm-publishdate" type="date" value="${src?escapeHtml(src.publishDate||''):''}"></div>
        </div>
        <div class="form-grid">
          <div class="field"><label>Song Artist</label><input id="dm-songartist" value="${src?escapeHtml(src.songArtist||''):''}" placeholder="e.g. Camellia"></div>
          <div class="field"><label>Song Name</label><input id="dm-songname" value="${src?escapeHtml(src.songName||''):''}" placeholder="e.g. Crystallized"></div>

        <div class="form-grid">
          <div class="field"><label>Points if beaten</label><input id="dm-points" type="number" min="0" value="${editing?editing.points:100}"></div>
          <div class="field"><label>Gameplay Video URL</label><input id="dm-video" value="${src?escapeHtml(src.video||''):''}" placeholder="https://youtube.com/..."></div>

        <div class="form-grid">
          <div class="field"><label>Verification Video URL <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="dm-verifyvideo" value="${src?escapeHtml(src.verifyVideo||''):''}" placeholder="https://youtube.com/..."></div>
          <div class="field"><label>Thumbnail URL <span style="color:var(--text-dim);font-weight:400;">(optional, auto from video)</span></label><input id="dm-thumbnail" value="${src?escapeHtml(src.thumbnail||''):''}" placeholder="https://..."></div>

        </div>
        <div class="form-grid">
          <div class="field">
            <label>Reduced Requirement (%) — optional</label>
            <input id="dm-req2" type="number" min="1" max="100" value="${editing&&editing.requirement2?editing.requirement2:''}" placeholder="e.g. 60">
          </div>
          <div class="field">
            <label>Reduced Points</label>
            <input id="dm-points2" type="number" min="0" value="${editing&&editing.points2?editing.points2:0}">

function quickAddTag(t){
  const input = document.getElementById('dm-tags');
  if(!input) return;
  const parts = input.value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!parts.includes(t)) parts.push(t);
  input.value = parts.join(', ');
}
async function saveDemonForm(id, promotedFromId){
  const name = document.getElementById('dm-name').value.trim();
  if(!name) return;

  const rawTags = document.getElementById('dm-tags').value;
  const processedTags = rawTags.split(',')
    .map(t => t.trim())
    .filter(t => t.length > 0);

  let requirement = parseInt(document.getElementById('dm-requirement').value);
  if(isNaN(requirement)) requirement = 100;
  requirement = Math.min(100, Math.max(1, requirement));

  let requirement2 = parseInt(document.getElementById('dm-req2').value);
  requirement2 = isNaN(requirement2) ? null : Math.min(100, Math.max(1, requirement2));
  if(requirement2 !== null && requirement2 >= requirement) requirement2 = null; // must be strictly lower
  const points2 = parseInt(document.getElementById('dm-points2').value) || 0;

  let decoRating = parseInt(document.getElementById('dm-decorating').value);
  decoRating = isNaN(decoRating) ? null : Math.min(10, Math.max(1, decoRating));
  let gameplayRating = parseInt(document.getElementById('dm-gameplayrating').value);
  gameplayRating = isNaN(gameplayRating) ? null : Math.min(10, Math.max(1, gameplayRating));
  let downloadCount = parseInt(document.getElementById('dm-downloads').value);
  downloadCount = isNaN(downloadCount) ? 0 : Math.max(0, downloadCount);

  const points = parseInt(document.getElementById('dm-points').value) || 0;
  const difficultyChange = document.getElementById('dm-diffchange').value;

  const data = {
    name,
    creator: document.getElementById('dm-creator').value.trim(),
    verifier: document.getElementById('dm-verifier').value.trim(),
    country: document.getElementById('dm-country').value,
    points,
    video: document.getElementById('dm-video').value.trim(),
    verifyVideo: document.getElementById('dm-verifyvideo').value.trim(),
    thumbnail: document.getElementById('dm-thumbnail').value.trim(),
    levelId: document.getElementById('dm-levelid').value.trim(),
    songArtist: document.getElementById('dm-songartist').value.trim(),
    songName: document.getElementById('dm-songname').value.trim(),
    publishDate: document.getElementById('dm-publishdate').value,
    description: document.getElementById('dm-desc').value.trim(),
    tags: processedTags,
    requirement,
    requirement2,
    points2,
    lengthTag: document.getElementById('dm-length').value,
    difficultyChange,
    decoRating,
    gameplayRating,
    downloadCount
  };
  if(id){
    const d = APP.demons.find(x=>x.id===id);
    logLevelHistory(d, data);
    Object.assign(d, data);
  }else{
    APP.demons.push({ id: uid(), ...data, addedAt: Date.now(), likes:{}, enjoymentRatings:{}, levelChangelog:[] });
    APP.selectedDemonId = APP.demons[APP.demons.length-1].id;
  }
  await saveDemons();
  if(promotedFromId){
    APP.upcoming = APP.upcoming.filter(u=>u.id!==promotedFromId);
    await saveUpcoming();
  }
  closeModal();
  renderAll();
  showToast(id ? 'Demon updated' : (promotedFromId ? 'Promoted to main list' : 'Demon added'));
}
function logLevelHistory(d, newData){
  if(!d.levelChangelog) d.levelChangelog = [];
  const entries = [];
  if(newData.requirement !== d.requirement) entries.push(`Requirement changed from ${d.requirement||100}% to ${newData.requirement}%`);
  if(newData.points !== d.points) entries.push(`Points changed from ${d.points} to ${newData.points}`);
  if(newData.difficultyChange && newData.difficultyChange !== d.difficultyChange) entries.push(`Level marked as ${newData.difficultyChange}`);
  entries.forEach(text => d.levelChangelog.push({ id: uid(), ts: Date.now(), text, auto: true, mod: APP.currentUser ? APP.currentUser.username : null }));
}
async function addLevelChangelogEntry(demonId){
  const d = APP.demons.find(x=>x.id===demonId);
  if(!d || !isMod()) return;
  const text = prompt('Changelog entry text (e.g. "Nerfed from Extreme to Insane Demon"):');
  if(!text || !text.trim()) return;
  if(!d.levelChangelog) d.levelChangelog = [];
  d.levelChangelog.push({ id: uid(), ts: Date.now(), text: text.trim(), auto:false, mod: APP.currentUser.username });
  await saveDemons();

  showToast('Changelog entry added');
}
async function toggleLevelLike(demonId){
  if(!APP.currentUser){ showToast('Log in to like levels', 'error'); return; }
  const d = APP.demons.find(x=>x.id===demonId);
  if(!d) return;

async function rateEnjoyment(demonId, value){

function getEnjoymentAverage(d){
  const vals = Object.values(d.enjoymentRatings||{});
  if(!vals.length) return null;
  return { avg: (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1), count: vals.length };

  }

    </div>

      <div class="roulette-card">
        ${cardInner}
