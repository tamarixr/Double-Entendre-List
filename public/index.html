function saveRouletteLocal(){ try{ localStorage.setItem('demonlist_roulette', JSON.stringify(APP.roulette)); }catch(e){} }
function loadRouletteLocal(){
  try{
    const raw = localStorage.getItem('demonlist_roulette');
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed === 'object') APP.roulette = Object.assign({ required:1, current:null, usedIds:[], history:[], done:false, streak:0, bestStreak:0 }, parsed);
    }
  }catch(e){}
}
function spinRoulette(btn){
  const rl = APP.roulette;
  let pool = APP.demons.filter(d => !rl.usedIds.includes(d.id));
  if(pool.length===0){ rl.usedIds = []; pool = APP.demons; }
  const pick = pool[Math.floor(Math.random()*pool.length)];
  rl.current = pick;
  rl.usedIds.push(pick.id);
  saveRouletteLocal();
  if(btn) btn.classList.add('spinning');
  setTimeout(renderRouletteTab, btn ? 220 : 0);
}
function submitRoulettePercent(){
  const input = document.getElementById('rl-percent');
  const val = parseInt(input.value);
  const rl = APP.roulette;
  const fb = document.getElementById('rl-feedback');
  if(isNaN(val) || val<1 || val>100){ fb.textContent = 'Enter a percent between 1 and 100.'; fb.className='roulette-feedback fail'; return; }

  const required = rl.required;
  const pass = val >= required;
  rl.history.push({ name: rl.current.name, required, achieved: val, result: pass ? 'pass':'fail' });

  if(pass){
    rl.streak = (rl.streak||0) + 1;
    rl.bestStreak = Math.max(rl.bestStreak||0, rl.streak);
    if(val >= 100){
      fb.textContent = 'Roulette cleared! Starting a new run at 1%.';
      fb.className = 'roulette-feedback pass';
      rl.required = 1;
    }else{
      rl.required = Math.min(100, val+1);
      fb.textContent = `Cleared! Next requirement: ${rl.required}%.`;
      fb.className = 'roulette-feedback pass';
    }
    rl.current = null;
  }else{
    rl.streak = 0;
    fb.textContent = `Short of ${required}% — run reset to 1%.`;
    fb.className = 'roulette-feedback fail';
    rl.required = 1;
    rl.current = null;
  }
  saveRouletteLocal();
  setTimeout(renderRouletteTab, pass ? 300 : 900);
}
function resetRoulette(){
  APP.roulette = { required: 1, current: null, usedIds: [], history: [], done:false, streak:0, bestStreak: APP.roulette.bestStreak||0 };
  saveRouletteLocal();
  renderRouletteTab();
}

/* ============================= LEADERBOARD TAB ============================= */
function setLbSearch(v){ APP.lbFilter.search = v; renderLeaderboardTab(true); }
function setLbSort(v){ APP.lbFilter.sort = v; renderLeaderboardTab(); }
function getFilteredSortedPlayers(){
  const { search, sort } = APP.lbFilter;
  const q = search.trim().toLowerCase();
  let list = APP.players.slice();
  if(q) list = list.filter(p => p.name.toLowerCase().includes(q) || countryName(p.country).toLowerCase().includes(q));
  if(sort === 'az') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort === 'za') list.sort((a,b)=>b.name.localeCompare(a.name));
  else list.sort((a,b)=>b.points-a.points); // points desc default
  return list;
}
function exportLeaderboardCsv(){
  const sorted = APP.players.slice().sort((a,b)=>b.points-a.points);
  if(!sorted.length){ showToast('No players to export', 'error'); return; }
  const header = 'Rank,Name,Region,Points\n';
  const rows = sorted.map((p,i) => `${i+1},"${(p.name||'').replace(/"/g,'""')}",${countryName(p.country)},${p.points}`).join('\n');
  const blob = new Blob([header+rows], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'leaderboard.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}
function setLbView(v){ APP.lbFilter.view = v; renderLeaderboardTab(); }
function getNationStandings(){
  const byCountry = {};
  APP.players.forEach(p => {
    const c = p.country || 'OTHER';
    if(!byCountry[c]) byCountry[c] = { country: c, points: 0, players: 0, best: null };
    byCountry[c].points += (p.points||0);
    byCountry[c].players += 1;
    if(!byCountry[c].best || p.points > byCountry[c].best.points) byCountry[c].best = p;
  });
  return Object.values(byCountry).sort((a,b)=>b.points-a.points);
}
function getRecentRecords(limit){
  return APP.submissions.filter(s=>s.status==='approved').slice().reverse().slice(0, limit||25);
}

        <div>
          <span class="who">${escapeHtml(s.player)}</span>
          <span class="what"> — ${demon?escapeHtml(demon.name):'(deleted demon)'} · ${s.percent}%</span>
        </div>
        <span class="status-pill ${s.status}">${s.status}</span>
      </div>
      ${s.note ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px; font-style:italic;">"${escapeHtml(s.note)}"</div>` : ''}
      ${s.attempts ? `<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:2px;">${s.attempts.toLocaleString()} attempts</div>` : ''}
      <a class="sub-link" href="${escapeHtml(s.video)}" target="_blank">Watch submission ↗</a>
      ${s.rawFootage ? ` · <a class="sub-link" href="${escapeHtml(s.rawFootage)}" target="_blank">Raw footage ↗</a>` : ''}
      ${isMod() ? `
      <div class="field" style="margin-top:6px;margin-bottom:0;">
        <textarea placeholder="Private moderator notes (not visible to the player)" style="font-size:11.5px;min-height:40px;" onchange="setModNote('${s.id}', this.value)">${escapeHtml(s.modNote||'')}</textarea>
      </div>` : ''}
      ${isMod() && s.status==='pending' ? `
      <div class="sub-actions">
        <button class="btn small primary" onclick="reviewSubmission('${s.id}','approved')">Approve</button>
        <button class="btn small danger" onclick="reviewSubmission('${s.id}','rejected')">Reject</button>
      </div>` : ''}
    </div>`;
  }).join('') : `<div class="empty-state"><div class="big">No submissions${status!=='all'||q?' match':' yet'}</div>${status!=='all'||q ? 'Try clearing the filters.' : 'Plays sent for review will show up here.'}</div>`;

  el.innerHTML = `
    <div class="page-head">
      <h1 class="page-title">Submit a Play</h1>
      <p class="page-desc">Send a video of your run to the list moderators. Approved plays award the demon's points to your leaderboard total.</p>
    </div>
    <div class="list-layout" ${isMod() ? '' : 'style="grid-template-columns:1fr;"'}>
      <div class="panel">
        <div class="panel-head"><h3>New Submission</h3></div>
        <div style="padding:14px;">
          ${APP.demons.length ? `
          <div class="field"><label>Your Player Name</label><input id="sb-player" list="knownPlayers" value="${APP.currentUser?escapeHtml(APP.currentUser.username):''}"></div>
          <datalist id="knownPlayers">${APP.players.map(p=>`<option value="${escapeHtml(p.name)}">`).join('')}</datalist>
          <div class="field"><label>Demon</label><select id="sb-demon" onchange="updateSubRequirementHint()">${demonOptions}</select></div>
          <div class="form-grid">
            <div class="field"><label>Percent</label><input id="sb-percent" type="number" min="1" max="100" value="100"></div>
            <div class="field"><label>Region</label><select id="sb-country">${countryOptions('US')}</select></div>
          </div>
          <div class="req-hint" id="subReqHint"></div>
          <div class="field"><label>Video URL</label><input id="sb-video" placeholder="https://youtube.com/..."></div>
          <div class="form-grid">
            <div class="field"><label>Attempts <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="sb-attempts" type="number" min="1" placeholder="e.g. 4200"></div>
            <div class="field"><label>Raw Footage URL <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label><input id="sb-rawfootage" placeholder="Google Drive / Dropbox link"></div>
          </div>
          <div class="field"><label>Note (optional)</label><textarea id="sb-note" placeholder="Anything moderators should know"></textarea></div>
          <button class="btn primary" style="width:100%;" onclick="submitPlay()">Send for Review</button>
          <div id="submitMsg"></div>
          ` : `<div class="empty-state">Add demons to the list first.</div>`}
        </div>
      </div>
      ${isMod() ? `
      <div class="panel">
        <div class="panel-head"><h3>Queue</h3></div>
        ${APP.submissions.length ? `
        <div class="status-filter-row">
          <button class="status-filter-btn ${status==='all'?'active':''}" onclick="setSubStatusFilter('all')">All (${counts.all})</button>
          <button class="status-filter-btn ${status==='pending'?'active':''}" onclick="setSubStatusFilter('pending')">Pending (${counts.pending})</button>
          <button class="status-filter-btn ${status==='approved'?'active':''}" onclick="setSubStatusFilter('approved')">Approved (${counts.approved})</button>
          <button class="status-filter-btn ${status==='rejected'?'active':''}" onclick="setSubStatusFilter('rejected')">Rejected (${counts.rejected})</button>
        </div>
        <div class="list-toolbar" style="border-bottom:none;">
          <div class="search-input-wrap">
            <span class="si-icon">⌕</span>
            <input id="sub-search" placeholder="Search player or level..." value="${escapeHtml(search)}" oninput="setSubSearch(this.value)">
          </div>
        </div>` : ''}
        <div class="sub-list demon-rows" style="max-height:none;">${queueHtml}</div>
      </div>` : ''}
    </div>
  `;
  if(preserveFocus){
    const s = document.getElementById('sub-search');
    if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
  }
  updateSubRequirementHint();
}
function updateSubRequirementHint(){
  const sel = document.getElementById('sb-demon');
  const hint = document.getElementById('subReqHint');
  if(!sel || !hint) return;
  const demon = APP.demons.find(d=>d.id===sel.value);
  const req = demon && demon.requirement ? demon.requirement : 100;
  let text = req < 100 ? `This demon accepts records of ${req}% or higher.` : `This demon requires a 100% completion.`;
  if(demon && demon.requirement2){
    text += ` Records from ${demon.requirement2}% up to ${req-1}% are accepted for ${demon.points2||0} reduced points instead of the full ${demon.points}.`;
  }
  hint.textContent = text;
}
async function submitPlay(){
  const player = document.getElementById('sb-player').value.trim();
  const demonId = document.getElementById('sb-demon').value;
  const percent = parseInt(document.getElementById('sb-percent').value);
  const video = document.getElementById('sb-video').value.trim();
  const country = document.getElementById('sb-country').value;
  const note = document.getElementById('sb-note').value.trim();
  const attemptsRaw = parseInt(document.getElementById('sb-attempts').value);
  const attempts = isNaN(attemptsRaw) ? null : Math.max(1, attemptsRaw);
  const rawFootage = document.getElementById('sb-rawfootage').value.trim();
  const msgEl = document.getElementById('submitMsg');
  if(!player || !video || isNaN(percent) || percent<1 || percent>100){
    msgEl.innerHTML = `<div class="msg error">Fill in your name, a percent (1-100), and a video URL.</div>`;
    return;
  }
  const demon = APP.demons.find(d=>d.id===demonId);
  const req = demon && demon.requirement ? demon.requirement : 100;
  const floor = (demon && demon.requirement2) ? demon.requirement2 : req;
  if(percent < floor){
    msgEl.innerHTML = `<div class="msg error">This demon requires at least ${floor}% to be submitted.</div>`;
    return;
  }
  APP.submissions.push({ id: uid(), player, demonId, percent, video, country, note, attempts, rawFootage, status:'pending', submittedAt: Date.now(), modNote:'' });
  await saveSubmissions();
  msgEl.innerHTML = `<div class="msg ok">Submitted! A moderator will review it soon.</div>`;
  renderSubmitTab();
}
async function setModNote(id, value){
  if(!isMod()) return;
  const s = APP.submissions.find(x=>x.id===id);
  if(!s) return;
  s.modNote = value;
  await saveSubmissions();
}
async function reviewSubmission(id, status){
  if(!isMod()) return;
  const s = APP.submissions.find(x=>x.id===id);
  if(!s) return;
  s.status = status;
  if(status==='approved'){
    const demon = APP.demons.find(d=>d.id===s.demonId);
    let player = APP.players.find(p=>p.name.toLowerCase()===s.player.toLowerCase());
    if(!player){
      player = { id: uid(), name: s.player, country: s.country||'OTHER', points: 0 };
      APP.players.push(player);
    }
    if(demon){
      let awarded = demon.points;
      if(demon.requirement2 && s.percent < (demon.requirement||100) && s.percent >= demon.requirement2){
        awarded = demon.points2 || 0;
      }
      player.points += awarded;
    }
    await savePlayers();
  }
  await saveSubmissions();
  renderAll();
  showToast(status==='approved' ? 'Submission approved' : 'Submission rejected', status==='approved'?'ok':'error');
}

/* ============================= INIT ============================= */
async function init(){     
  restoreSidebarState();
  await loadAll();
  restoreSession();
  loadRouletteLocal();

  applyHashRoute();
  if(!location.hash){
    const lastTab = recallTab();
    if(lastTab && document.getElementById('panel-'+lastTab)) APP.activeTab = lastTab;
  }
  document.querySelectorAll('nav.side-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab===APP.activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+APP.activeTab));

  renderAccountArea();
  renderAll();

  const loader = document.getElementById('initLoader');
  if(loader) loader.classList.add('hidden');
}
window.addEventListener('hashchange', () => { applyHashRoute(); renderAll(); document.querySelectorAll('nav.side-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab===APP.activeTab)); document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+APP.activeTab)); });
init();
</script>
</body>
